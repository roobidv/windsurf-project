<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>זמני אוטובוס</title>
    <meta name="theme-color" content="#1a73e8">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚌</text></svg>">
    <style>
        :root {
            --primary: #1a73e8;
            --primary-dark: #1557b0;
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --text: #1a1a2e;
            --text-muted: #6b7280;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
            --radius: 14px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        .header {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            padding: 16px 16px 12px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 12px rgba(26,115,232,0.3);
        }
        .header h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
        .header-sub {
            font-size: 12px;
            opacity: 0.85;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .header-sub .dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            display: inline-block;
        }
        .dot-ok { background: var(--success); animation: pulse 2s infinite; }
        .dot-err { background: var(--danger); }
        .dot-load { background: var(--warning); animation: pulse 0.8s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

        .toolbar {
            background: white;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border-bottom: 1px solid #e5e7eb;
            flex-wrap: wrap;
        }
        .toolbar button {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 6px 14px;
            font-size: 13px;
            cursor: pointer;
            font-family: inherit;
        }
        .toolbar button:active { opacity: 0.8; }
        .toolbar .timer {
            font-size: 11px;
            color: var(--text-muted);
        }

        .stops-container {
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 600px;
            margin: 0 auto;
        }
        .stop-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }
        .stop-header {
            padding: 12px 14px 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #f3f4f6;
        }
        .stop-name { font-size: 16px; font-weight: 700; }
        .stop-code {
            font-size: 11px;
            color: var(--text-muted);
            background: #f3f4f6;
            padding: 2px 8px;
            border-radius: 10px;
            font-family: monospace;
        }
        .stop-city {
            font-size: 11px;
            color: var(--text-muted);
            padding: 0 14px 4px;
        }
        .stop-body { padding: 6px 14px 12px; }

        .bus-row {
            display: flex;
            align-items: center;
            padding: 7px 0;
            border-bottom: 1px solid #f9fafb;
        }
        .bus-row:last-child { border-bottom: none; }
        .bus-line {
            background: var(--primary);
            color: white;
            font-weight: 700;
            font-size: 15px;
            min-width: 46px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: 10px;
            flex-shrink: 0;
        }
        .bus-dest {
            flex: 1;
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .bus-agency {
            font-size: 10px;
            color: var(--text-muted);
            margin-right: 4px;
        }
        .bus-eta {
            font-size: 15px;
            font-weight: 700;
            min-width: 60px;
            text-align: center;
            flex-shrink: 0;
        }
        .eta-now { color: var(--success); animation: pulse 1s infinite; }
        .eta-soon { color: var(--warning); }
        .eta-normal { color: var(--text); }
        .no-data {
            text-align: center;
            padding: 18px 0;
            color: var(--text-muted);
            font-size: 13px;
        }
        .stop-loading {
            text-align: center;
            padding: 18px 0;
            color: var(--text-muted);
            font-size: 13px;
        }
        .spinner {
            width: 22px; height: 22px;
            border: 2.5px solid #e5e7eb;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .stop-error {
            text-align: center;
            padding: 14px 0;
            color: var(--danger);
            font-size: 12px;
        }

        /* Settings overlay */
        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }
        .overlay.active { display: flex; }
        .dialog {
            background: white;
            border-radius: 16px;
            width: 92%;
            max-width: 460px;
            max-height: 88vh;
            overflow-y: auto;
            padding: 20px;
        }
        .dialog h2 { font-size: 18px; margin-bottom: 14px; text-align: center; }
        .field-group { margin-bottom: 10px; }
        .field-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 3px;
        }
        .field-group input {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
        }
        .field-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(26,115,232,0.2);
        }
        .stop-cfg {
            background: #f9fafb;
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 6px;
        }
        .stop-cfg-title {
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 5px;
            color: var(--primary);
        }
        .stop-cfg-row {
            display: flex;
            gap: 8px;
        }
        .stop-cfg-row input { flex: 1; }
        .stop-cfg-row input.code-in {
            max-width: 90px;
            text-align: center;
            font-family: monospace;
        }
        .btn-row { display: flex; gap: 8px; margin-top: 14px; }
        .btn-save {
            flex: 1;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
        }
        .btn-cancel {
            flex: 1;
            background: #f3f4f6;
            color: var(--text);
            border: none;
            border-radius: 10px;
            padding: 10px;
            font-size: 15px;
            cursor: pointer;
            font-family: inherit;
        }
        .footer {
            text-align: center;
            padding: 20px;
            font-size: 11px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

<div class="header">
    <h1>🚌 זמני אוטובוס</h1>
    <div class="header-sub">
        <span class="dot dot-load" id="statusDot"></span>
        <span id="statusText">מתחבר...</span>
    </div>
</div>

<div class="toolbar">
    <button onclick="refreshAll()">רענן</button>
    <span class="timer" id="timerText">רענון אוטומטי כל 60 שניות</span>
    <button onclick="openSettings()">⚙️ הגדרות</button>
</div>

<div class="stops-container" id="stopsContainer"></div>

<div class="footer">
    נתונים: Open Bus — הסדנא לידע ציבורי<br>
    עדכון אחרון: <span id="lastRefresh">-</span>
</div>

<!-- Settings -->
<div class="overlay" id="settingsOverlay" onclick="if(event.target===this)closeSettings()">
    <div class="dialog">
        <h2>⚙️ הגדרות תחנות</h2>
        <div id="stopsCfgList"></div>
        <div class="btn-row">
            <button class="btn-save" onclick="saveSettings()">שמור</button>
            <button class="btn-cancel" onclick="closeSettings()">ביטול</button>
        </div>
    </div>
</div>

<script>
// ===== Config =====
const API = 'https://open-bus-stride-api.hasadna.org.il';
const NUM_STOPS = 9;
const REFRESH_SEC = 60;

const DEFAULT_STOPS = [
    { code: '', name: 'תחנה 1' },
    { code: '', name: 'תחנה 2' },
    { code: '', name: 'תחנה 3' },
    { code: '', name: 'תחנה 4' },
    { code: '', name: 'תחנה 5' },
    { code: '', name: 'תחנה 6' },
    { code: '', name: 'תחנה 7' },
    { code: '', name: 'תחנה 8' },
    { code: '', name: 'תחנה 9' }
];

let refreshTimer = null;
let countdownTimer = null;
let countdown = REFRESH_SEC;

// ===== Helpers =====
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function getConfig() {
    try { return JSON.parse(localStorage.getItem('bus_stops_cfg')) || null; }
    catch(e) { return null; }
}
function getCfgStops() {
    const c = getConfig();
    return (c && c.length) ? c : DEFAULT_STOPS;
}
function saveCfgStops(arr) {
    localStorage.setItem('bus_stops_cfg', JSON.stringify(arr));
}

function toISOLocal(d) {
    const off = d.getTimezoneOffset();
    const sign = off <= 0 ? '+' : '-';
    const h = String(Math.floor(Math.abs(off)/60)).padStart(2,'0');
    const m = String(Math.abs(off)%60).padStart(2,'0');
    const iso = new Date(d.getTime() - off*60000).toISOString().replace('Z','');
    return iso + sign + h + ':' + m;
}

// ===== Render =====
function renderCards() {
    const stops = getCfgStops();
    const c = document.getElementById('stopsContainer');
    c.innerHTML = stops.map((s, i) => {
        if (!s.code) return '';
        return `
        <div class="stop-card" id="card_${i}">
            <div class="stop-header">
                <span class="stop-name" id="sname_${i}">${esc(s.name)}</span>
                <span class="stop-code">${esc(s.code)}</span>
            </div>
            <div class="stop-city" id="scity_${i}"></div>
            <div class="stop-body" id="body_${i}">
                <div class="stop-loading"><div class="spinner"></div>טוען...</div>
            </div>
        </div>`;
    }).join('');
}

// ===== Fetch arrivals for one stop =====
async function fetchStop(stopCode, idx) {
    const body = document.getElementById('body_' + idx);
    if (!body) return;

    try {
        const now = new Date();
        const later = new Date(now.getTime() + 90 * 60000); // +90 min
        const from = toISOLocal(now);
        const to = toISOLocal(later);
        const today = now.toISOString().split('T')[0];

        const url = `${API}/gtfs_ride_stops/list?` +
            `gtfs_stop__code=${stopCode}` +
            `&gtfs_stop__date_from=${today}&gtfs_stop__date_to=${today}` +
            `&arrival_time_from=${encodeURIComponent(from)}` +
            `&arrival_time_to=${encodeURIComponent(to)}` +
            `&limit=20` +
            `&order_by=arrival_time asc`;

        const resp = await fetch(url);
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const data = await resp.json();

        // Update stop name/city from first result
        if (data.length > 0 && data[0].gtfs_stop__name) {
            const el = document.getElementById('sname_' + idx);
            const cityEl = document.getElementById('scity_' + idx);
            if (el && data[0].gtfs_stop__name) {
                // Keep user's custom name if set, otherwise use API name
                const cfg = getCfgStops();
                if (!cfg[idx].name || cfg[idx].name === 'תחנה ' + (idx+1)) {
                    el.textContent = data[0].gtfs_stop__name;
                }
            }
            if (cityEl && data[0].gtfs_stop__city) {
                cityEl.textContent = data[0].gtfs_stop__city;
            }
        }

        renderArrivals(body, data, now);
    } catch(e) {
        body.innerHTML = `<div class="stop-error">⚠️ שגיאה: ${esc(e.message)}</div>`;
    }
}

function renderArrivals(body, data, now) {
    if (!data || data.length === 0) {
        body.innerHTML = '<div class="no-data">אין אוטובוסים קרובים כרגע</div>';
        return;
    }

    // Deduplicate by line+time (sometimes duplicates appear)
    const seen = new Set();
    const arrivals = data.filter(d => {
        const key = (d.gtfs_route__route_short_name||'') + '_' + d.arrival_time;
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
    }).map(d => {
        const eta = d.arrival_time ? new Date(d.arrival_time) : null;
        const min = eta ? Math.round((eta - now) / 60000) : null;
        return {
            line: d.gtfs_route__route_short_name || '?',
            dest: d.gtfs_route__route_long_name || '',
            agency: d.gtfs_route__agency_name || '',
            minutes: min,
            time: eta
        };
    }).filter(a => a.minutes !== null && a.minutes >= -2)
      .sort((a,b) => a.minutes - b.minutes)
      .slice(0, 8);

    if (arrivals.length === 0) {
        body.innerHTML = '<div class="no-data">אין אוטובוסים קרובים כרגע</div>';
        return;
    }

    body.innerHTML = arrivals.map(a => {
        let cls, txt;
        if (a.minutes <= 1) { cls = 'eta-now'; txt = 'עכשיו'; }
        else if (a.minutes <= 5) { cls = 'eta-soon'; txt = a.minutes + " דק'"; }
        else { cls = 'eta-normal'; txt = a.minutes + " דק'"; }

        // Extract destination from route long name (usually "origin-destination")
        let dest = a.dest;
        const parts = dest.split('-');
        if (parts.length >= 2) dest = parts[parts.length-1].trim();
        if (dest.length > 25) dest = dest.substring(0,25) + '...';

        return `
            <div class="bus-row">
                <div class="bus-line">${esc(a.line)}</div>
                <div class="bus-dest">
                    ${esc(dest)}
                    ${a.agency ? '<span class="bus-agency">(' + esc(a.agency) + ')</span>' : ''}
                </div>
                <div class="bus-eta ${cls}">${txt}</div>
            </div>`;
    }).join('');
}

// ===== Refresh all =====
async function refreshAll() {
    const stops = getCfgStops().filter(s => s.code);
    if (stops.length === 0) {
        document.getElementById('statusDot').className = 'dot dot-err';
        document.getElementById('statusText').textContent = 'לא הוגדרו תחנות — פתח הגדרות';
        return;
    }

    document.getElementById('statusDot').className = 'dot dot-load';
    document.getElementById('statusText').textContent = 'מעדכן...';

    const allStops = getCfgStops();
    const promises = allStops.map((s, i) => s.code ? fetchStop(s.code, i) : Promise.resolve());
    const results = await Promise.allSettled(promises);

    const errs = results.filter(r => r.status === 'rejected').length;
    const now = new Date();
    document.getElementById('lastRefresh').textContent =
        now.toLocaleTimeString('he-IL', { hour:'2-digit', minute:'2-digit', second:'2-digit' });

    if (errs === 0) {
        document.getElementById('statusDot').className = 'dot dot-ok';
        document.getElementById('statusText').textContent = 'מחובר — לוח זמנים מתוכנן';
    } else {
        document.getElementById('statusDot').className = 'dot dot-err';
        document.getElementById('statusText').textContent = errs + ' תחנות עם שגיאה';
    }
    countdown = REFRESH_SEC;
}

function startAutoRefresh() {
    if (refreshTimer) clearInterval(refreshTimer);
    if (countdownTimer) clearInterval(countdownTimer);
    refreshTimer = setInterval(refreshAll, REFRESH_SEC * 1000);
    countdownTimer = setInterval(() => {
        countdown--;
        if (countdown < 0) countdown = REFRESH_SEC;
        document.getElementById('timerText').textContent = 'רענון בעוד ' + countdown + ' שניות';
    }, 1000);
}

// ===== Settings =====
function openSettings() {
    const stops = getCfgStops();
    document.getElementById('stopsCfgList').innerHTML = stops.map((s, i) => `
        <div class="stop-cfg">
            <div class="stop-cfg-title">תחנה ${i+1}</div>
            <div class="stop-cfg-row">
                <input class="code-in" type="text" id="cfg_code_${i}" value="${esc(s.code)}" placeholder="מספר תחנה" inputmode="numeric" dir="ltr">
                <input type="text" id="cfg_name_${i}" value="${esc(s.name)}" placeholder="שם (אופציונלי)">
            </div>
        </div>
    `).join('');
    document.getElementById('settingsOverlay').classList.add('active');
}

function closeSettings() {
    document.getElementById('settingsOverlay').classList.remove('active');
}

function saveSettings() {
    const stops = [];
    for (let i = 0; i < NUM_STOPS; i++) {
        const code = (document.getElementById('cfg_code_' + i)?.value || '').trim();
        const name = (document.getElementById('cfg_name_' + i)?.value || '').trim();
        stops.push({ code, name: name || ('תחנה ' + (i+1)) });
    }
    saveCfgStops(stops);
    closeSettings();
    renderCards();
    refreshAll();
}

// ===== Init =====
renderCards();
refreshAll();
startAutoRefresh();
</script>
</body>
</html>
