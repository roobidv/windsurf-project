<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>זמני אוטובוס</title>
    <meta name="theme-color" content="#1a73e8">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚌</text></svg>">
    <style>
        :root {
            --primary: #1a73e8;
            --primary-dark: #1557b0;
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --text: #1a1a2e;
            --text-muted: #6b7280;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            --green-bg: #c8f7c5;
            --green-header: #2e7d32;
            --red-bg: #fdd;
            --red-header: #c62828;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
            --radius: 14px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        .header {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            padding: 16px 16px 12px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 12px rgba(26,115,232,0.3);
        }
        .header h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
        .header-sub {
            font-size: 12px;
            opacity: 0.85;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .header-sub .dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            display: inline-block;
        }
        .dot-ok { background: var(--success); animation: pulse 2s infinite; }
        .dot-err { background: var(--danger); }
        .dot-load { background: var(--warning); animation: pulse 0.8s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

        .toolbar {
            background: white;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border-bottom: 1px solid #e5e7eb;
            flex-wrap: wrap;
        }
        .toolbar button {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 6px 14px;
            font-size: 13px;
            cursor: pointer;
            font-family: inherit;
        }
        .toolbar button:active { opacity: 0.8; }
        .toolbar .timer {
            font-size: 11px;
            color: var(--text-muted);
        }

        .section-title {
            max-width: 600px;
            margin: 16px auto 8px;
            padding: 10px 16px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 800;
            text-align: center;
        }
        .section-title.to-base {
            background: var(--green-bg);
            color: var(--green-header);
        }
        .section-title.to-home {
            background: var(--red-bg);
            color: var(--red-header);
        }

        .stops-container {
            padding: 0 12px 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 600px;
            margin: 0 auto;
        }

        .stop-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }
        .stop-card.dir-base { border-right: 5px solid var(--green-header); }
        .stop-card.dir-home { border-right: 5px solid var(--red-header); }

        .stop-header {
            padding: 12px 14px 6px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .stop-header.bg-green { background: var(--green-bg); }
        .stop-header.bg-red { background: var(--red-bg); }

        .stop-name { font-size: 15px; font-weight: 700; }
        .stop-code {
            font-size: 11px;
            color: var(--text-muted);
            background: rgba(255,255,255,0.7);
            padding: 2px 8px;
            border-radius: 10px;
            font-family: monospace;
        }
        .stop-desc {
            font-size: 13px;
            color: var(--text-muted);
            padding: 4px 14px 8px;
            border-bottom: 1px solid #f3f4f6;
        }
        .stop-img {
            width: 100%;
            max-height: 120px;
            object-fit: cover;
            display: block;
        }
        .stop-img-placeholder {
            width: 100%;
            height: 80px;
            background: #f3f4f6;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #aaa;
        }
        .stop-body { padding: 8px 14px 12px; }

        .bus-row {
            display: flex;
            align-items: center;
            padding: 7px 0;
            border-bottom: 1px solid #f9fafb;
        }
        .bus-row:last-child { border-bottom: none; }
        .bus-row.relevant { background: #f0f9ff; border-radius: 6px; margin: 2px -4px; padding: 7px 4px; }

        .bus-line {
            background: var(--primary);
            color: white;
            font-weight: 700;
            font-size: 14px;
            min-width: 46px;
            height: 30px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: 10px;
            flex-shrink: 0;
        }
        .bus-line.highlight {
            background: #ff6f00;
            font-size: 16px;
            min-width: 52px;
            height: 34px;
            box-shadow: 0 2px 6px rgba(255,111,0,0.3);
        }

        .bus-dest {
            flex: 1;
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .bus-dest.bold { font-weight: 700; font-size: 14px; }

        .bus-eta {
            font-size: 15px;
            font-weight: 700;
            min-width: 60px;
            text-align: center;
            flex-shrink: 0;
        }
        .eta-now { color: var(--success); animation: pulse 1s infinite; }
        .eta-soon { color: var(--warning); }
        .eta-normal { color: var(--text); }

        .no-data {
            text-align: center;
            padding: 18px 0;
            color: var(--text-muted);
            font-size: 13px;
        }
        .stop-loading {
            text-align: center;
            padding: 18px 0;
            color: var(--text-muted);
            font-size: 13px;
        }
        .spinner {
            width: 22px; height: 22px;
            border: 2.5px solid #e5e7eb;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .stop-error {
            text-align: center;
            padding: 14px 0;
            color: var(--danger);
            font-size: 12px;
        }

        .footer {
            text-align: center;
            padding: 20px;
            font-size: 11px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

<div class="header">
    <h1>🚌 זמני אוטובוס</h1>
    <div class="header-sub">
        <span class="dot dot-load" id="statusDot"></span>
        <span id="statusText">מתחבר...</span>
    </div>
</div>

<div class="toolbar">
    <button onclick="refreshAll()">רענן</button>
    <span class="timer" id="timerText">רענון אוטומטי כל 60 שניות</span>
</div>

<div id="mainContent"></div>

<div class="footer">
    נתונים: Open Bus — הסדנא לידע ציבורי<br>
    עדכון אחרון: <span id="lastRefresh">-</span>
</div>

<script>
// ===== Stops Data =====
const STOPS = [
    // === לכיוון הבסיס (GREEN) ===
    {
        code: '37018',
        name: 'מהשכונה טשרנחובסקי ויצמן',
        desc: 'ממש ליד השכרת רכב בשכונה',
        lines: ['640','468'],
        dir: 'base',
        img: '37018.jpg'
    },
    {
        code: '22942',
        name: 'מחלף גבעת שמואל/כביש 4',
        desc: 'ממש ליד מפעל קוקה קולה',
        lines: ['354','318'],
        dir: 'base',
        img: '22942.jpg'
    },
    {
        code: '33737',
        name: 'צומת בית דגן',
        desc: 'מפה ישירות לבסיס',
        lines: ['411','433'],
        dir: 'base',
        img: '33737.jpg'
    },
    {
        code: '32465',
        name: 'מליד העבודה של אבא',
        desc: 'ישיר עד הבסיס',
        lines: ['249'],
        dir: 'base',
        img: '32465.jpg'
    },
    // === חזרה הביתה (RED) ===
    {
        code: '33442',
        name: 'חזור מהבסיס תחנה שחורה',
        desc: '249 הלעבודה של אבא. האחרים לצומת בית דגן.',
        lines: ['249','411','458'],
        dir: 'home',
        img: '33442.jpg'
    },
    {
        code: '33440',
        name: 'צומת בית דגן',
        desc: 'נוסעים לגבעת שמואל תחנה',
        lines: ['20055'],
        dir: 'home',
        img: '33440.jpg'
    },
    {
        code: '21257',
        name: 'מיד אחרי גשר גבעת שמואל לכיוון',
        desc: 'קווים ישירים לכפר סבא',
        lines: ['640','468'],
        dir: 'home',
        img: '21257.jpg'
    }
];

const API = 'https://open-bus-stride-api.hasadna.org.il';
const REFRESH_SEC = 60;
let refreshTimer = null;
let countdownTimer = null;
let countdown = REFRESH_SEC;

// ===== Helpers =====
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function toISOLocal(d) {
    const off = d.getTimezoneOffset();
    const sign = off <= 0 ? '+' : '-';
    const h = String(Math.floor(Math.abs(off)/60)).padStart(2,'0');
    const m = String(Math.abs(off)%60).padStart(2,'0');
    const iso = new Date(d.getTime() - off*60000).toISOString().replace('Z','');
    return iso + sign + h + ':' + m;
}

// ===== Render =====
function renderCards() {
    const main = document.getElementById('mainContent');
    const baseStops = STOPS.filter(s => s.dir === 'base');
    const homeStops = STOPS.filter(s => s.dir === 'home');

    let html = '';
    html += '<div class="section-title to-base">🚌 לכיוון הבסיס</div>';
    html += '<div class="stops-container">';
    html += baseStops.map((s, i) => buildCard(s, STOPS.indexOf(s))).join('');
    html += '</div>';

    html += '<div class="section-title to-home">🏠 חזרה הביתה</div>';
    html += '<div class="stops-container">';
    html += homeStops.map((s, i) => buildCard(s, STOPS.indexOf(s))).join('');
    html += '</div>';

    main.innerHTML = html;
}

function buildCard(stop, idx) {
    const bgClass = stop.dir === 'base' ? 'bg-green' : 'bg-red';
    const dirClass = stop.dir === 'base' ? 'dir-base' : 'dir-home';
    const imgSrc = 'images/' + stop.img;

    return `
    <div class="stop-card ${dirClass}">
        <div class="stop-header ${bgClass}">
            <span class="stop-name">${esc(stop.name)}</span>
            <span class="stop-code">${esc(stop.code)}</span>
        </div>
        <div class="stop-desc">${esc(stop.desc)}</div>
        <img class="stop-img" src="${imgSrc}" alt="${esc(stop.name)}" onerror="this.outerHTML='<div class=stop-img-placeholder>📷 ${esc(stop.img)}</div>'">
        <div class="stop-body" id="body_${idx}">
            <div class="stop-loading"><div class="spinner"></div>טוען...</div>
        </div>
    </div>`;
}

// ===== Fetch arrivals =====
async function fetchStop(stop, idx) {
    const body = document.getElementById('body_' + idx);
    if (!body) return;

    try {
        const now = new Date();
        const later = new Date(now.getTime() + 90 * 60000);
        const from = toISOLocal(now);
        const to = toISOLocal(later);
        const today = now.toISOString().split('T')[0];

        const url = `${API}/gtfs_ride_stops/list?` +
            `gtfs_stop__code=${stop.code}` +
            `&gtfs_stop__date_from=${today}&gtfs_stop__date_to=${today}` +
            `&arrival_time_from=${encodeURIComponent(from)}` +
            `&arrival_time_to=${encodeURIComponent(to)}` +
            `&limit=25` +
            `&order_by=arrival_time asc`;

        const resp = await fetch(url);
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const data = await resp.json();
        renderArrivals(body, data, now, stop.lines);
    } catch(e) {
        body.innerHTML = `<div class="stop-error">⚠️ שגיאה: ${esc(e.message)}</div>`;
    }
}

function renderArrivals(body, data, now, relevantLines) {
    if (!data || data.length === 0) {
        body.innerHTML = '<div class="no-data">אין אוטובוסים קרובים כרגע</div>';
        return;
    }

    const seen = new Set();
    const arrivals = data.filter(d => {
        const key = (d.gtfs_route__route_short_name||'') + '_' + d.arrival_time;
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
    }).map(d => {
        const eta = d.arrival_time ? new Date(d.arrival_time) : null;
        const min = eta ? Math.round((eta - now) / 60000) : null;
        const lineNum = d.gtfs_route__route_short_name || '?';
        return {
            line: lineNum,
            dest: d.gtfs_route__route_long_name || '',
            agency: d.gtfs_route__agency_name || '',
            minutes: min,
            isRelevant: relevantLines.includes(lineNum)
        };
    }).filter(a => a.minutes !== null && a.minutes >= -2)
      .sort((a,b) => {
          // Relevant lines first, then by time
          if (a.isRelevant && !b.isRelevant) return -1;
          if (!a.isRelevant && b.isRelevant) return 1;
          return a.minutes - b.minutes;
      })
      .slice(0, 10);

    if (arrivals.length === 0) {
        body.innerHTML = '<div class="no-data">אין אוטובוסים קרובים כרגע</div>';
        return;
    }

    body.innerHTML = arrivals.map(a => {
        let cls, txt;
        if (a.minutes <= 1) { cls = 'eta-now'; txt = 'עכשיו'; }
        else if (a.minutes <= 5) { cls = 'eta-soon'; txt = a.minutes + " דק'"; }
        else { cls = 'eta-normal'; txt = a.minutes + " דק'"; }

        let dest = a.dest;
        const parts = dest.split('-');
        if (parts.length >= 2) dest = parts[parts.length-1].trim();
        if (dest.length > 28) dest = dest.substring(0,28) + '...';

        const rowClass = a.isRelevant ? 'bus-row relevant' : 'bus-row';
        const lineClass = a.isRelevant ? 'bus-line highlight' : 'bus-line';
        const destClass = a.isRelevant ? 'bus-dest bold' : 'bus-dest';

        return `
            <div class="${rowClass}">
                <div class="${lineClass}">${esc(a.line)}</div>
                <div class="${destClass}">${esc(dest)}</div>
                <div class="bus-eta ${cls}">${txt}</div>
            </div>`;
    }).join('');
}

// ===== Refresh =====
async function refreshAll() {
    document.getElementById('statusDot').className = 'dot dot-load';
    document.getElementById('statusText').textContent = 'מעדכן...';

    const promises = STOPS.map((s, i) => fetchStop(s, i));
    const results = await Promise.allSettled(promises);

    const errs = results.filter(r => r.status === 'rejected').length;
    const now = new Date();
    document.getElementById('lastRefresh').textContent =
        now.toLocaleTimeString('he-IL', { hour:'2-digit', minute:'2-digit', second:'2-digit' });

    if (errs === 0) {
        document.getElementById('statusDot').className = 'dot dot-ok';
        document.getElementById('statusText').textContent = 'מחובר — לוח זמנים מתוכנן';
    } else {
        document.getElementById('statusDot').className = 'dot dot-err';
        document.getElementById('statusText').textContent = errs + ' תחנות עם שגיאה';
    }
    countdown = REFRESH_SEC;
}

function startAutoRefresh() {
    if (refreshTimer) clearInterval(refreshTimer);
    if (countdownTimer) clearInterval(countdownTimer);
    refreshTimer = setInterval(refreshAll, REFRESH_SEC * 1000);
    countdownTimer = setInterval(() => {
        countdown--;
        if (countdown < 0) countdown = REFRESH_SEC;
        document.getElementById('timerText').textContent = 'רענון בעוד ' + countdown + ' שניות';
    }, 1000);
}

// ===== Init =====
renderCards();
refreshAll();
startAutoRefresh();
</script>
</body>
</html>
