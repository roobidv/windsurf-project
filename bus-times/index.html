<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>זמני אוטובוס</title>
    <meta name="theme-color" content="#1a73e8">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚌</text></svg>">
    <style>
        :root {
            --primary: #1a73e8;
            --primary-dark: #1557b0;
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --text: #1a1a2e;
            --text-muted: #6b7280;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            --green-bg: #c8f7c5;
            --green-header: #2e7d32;
            --green-btn: #43a047;
            --red-bg: #fdd;
            --red-header: #c62828;
            --red-btn: #e53935;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
            --radius: 14px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        .header {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            padding: 14px 16px 10px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 12px rgba(26,115,232,0.3);
        }
        .header h1 { font-size: 20px; font-weight: 700; margin-bottom: 3px; }
        .header-sub {
            font-size: 11px;
            opacity: 0.85;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .header-sub .dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            display: inline-block;
        }
        .dot-ok { background: var(--success); animation: pulse 2s infinite; }
        .dot-err { background: var(--danger); }
        .dot-load { background: var(--warning); animation: pulse 0.8s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

        /* Stop selector buttons */
        .stop-buttons {
            background: white;
            padding: 10px 10px 8px;
            border-bottom: 1px solid #e5e7eb;
        }
        .btn-section-label {
            font-size: 11px;
            font-weight: 700;
            margin-bottom: 5px;
            padding-right: 4px;
        }
        .btn-section-label.lbl-base { color: var(--green-header); }
        .btn-section-label.lbl-home { color: var(--red-header); }
        .btn-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-bottom: 8px;
        }
        .stop-btn {
            border: none;
            border-radius: 8px;
            padding: 6px 8px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            color: white;
            flex: 1;
            min-width: 0;
            white-space: normal;
            line-height: 1.3;
            max-height: 42px;
            overflow: hidden;
            text-align: center;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .stop-btn:active { transform: scale(0.96); }
        .stop-btn.btn-base { background: var(--green-btn); }
        .stop-btn.btn-home { background: var(--red-btn); }
        .stop-btn.active { box-shadow: 0 0 0 3px rgba(0,0,0,0.3); transform: scale(1.03); }

        /* Custom stop search */
        .custom-search {
            display: flex;
            gap: 6px;
            margin-top: 2px;
            align-items: center;
        }
        .custom-search input {
            flex: 1;
            padding: 7px 10px;
            border: 1.5px solid #d1d5db;
            border-radius: 8px;
            font-size: 13px;
            font-family: inherit;
        }
        .custom-search input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 2px rgba(26,115,232,0.2); }
        .custom-search button {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 7px 14px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            white-space: nowrap;
        }

        /* Toolbar */
        .toolbar {
            background: #fafafa;
            padding: 6px 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border-bottom: 1px solid #e5e7eb;
        }
        .toolbar button {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 5px 12px;
            font-size: 12px;
            cursor: pointer;
            font-family: inherit;
        }
        .toolbar .timer { font-size: 11px; color: var(--text-muted); }

        /* Single stop card */
        .stop-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            max-width: 600px;
            margin: 12px auto;
        }
        .stop-card.dir-base { border-right: 5px solid var(--green-header); }
        .stop-card.dir-home { border-right: 5px solid var(--red-header); }
        .stop-card.dir-custom { border-right: 5px solid var(--primary); }

        .stop-header {
            padding: 12px 14px 6px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .stop-header.bg-green { background: var(--green-bg); }
        .stop-header.bg-red { background: var(--red-bg); }
        .stop-header.bg-blue { background: #e3f2fd; }

        .stop-name { font-size: 16px; font-weight: 700; }
        .stop-code {
            font-size: 12px;
            color: var(--text-muted);
            background: rgba(255,255,255,0.7);
            padding: 2px 8px;
            border-radius: 10px;
            font-family: monospace;
        }
        .stop-desc {
            font-size: 13px;
            color: var(--text-muted);
            padding: 4px 14px 8px;
            border-bottom: 1px solid #f3f4f6;
        }
        .stop-img {
            width: 100%;
            max-height: 140px;
            object-fit: cover;
            display: block;
        }
        .stop-img.img-bottom { object-position: center bottom; }
        .stop-img-placeholder {
            width: 100%;
            height: 70px;
            background: #f3f4f6;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #aaa;
        }
        .stop-body { padding: 8px 14px 14px; }

        /* Bus rows */
        .bus-row {
            display: flex;
            align-items: center;
            padding: 8px 6px;
            margin-bottom: 3px;
            border-radius: 8px;
            background: #fafafa;
        }
        .bus-row.relevant {
            background: repeating-linear-gradient(
                -45deg,
                #fff8e1,
                #fff8e1 6px,
                #fff3cd 6px,
                #fff3cd 12px
            );
            border: 2px solid #ff8f00;
            border-radius: 10px;
            padding: 8px 6px;
        }

        .bus-line {
            background: var(--primary);
            color: white;
            font-weight: 700;
            font-size: 14px;
            min-width: 48px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: 10px;
            flex-shrink: 0;
        }
        .bus-line.highlight {
            background: #e65100;
            font-size: 17px;
            min-width: 56px;
            height: 36px;
            box-shadow: 0 2px 8px rgba(230,81,0,0.4);
        }

        .bus-dest {
            flex: 1;
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .bus-dest.bold { font-weight: 800; font-size: 14px; color: #e65100; }

        .bus-eta {
            font-size: 15px;
            font-weight: 700;
            min-width: 60px;
            text-align: center;
            flex-shrink: 0;
        }
        .eta-now { color: var(--success); animation: pulse 1s infinite; }
        .eta-soon { color: var(--warning); }
        .eta-normal { color: var(--text); }

        .no-data {
            text-align: center;
            padding: 20px 0;
            color: var(--text-muted);
            font-size: 14px;
        }
        .stop-loading {
            text-align: center;
            padding: 20px 0;
            color: var(--text-muted);
            font-size: 13px;
        }
        .spinner {
            width: 24px; height: 24px;
            border: 2.5px solid #e5e7eb;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .stop-error {
            text-align: center;
            padding: 14px 0;
            color: var(--danger);
            font-size: 13px;
        }

        .footer {
            text-align: center;
            padding: 16px;
            font-size: 11px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

<div style="background:#333;text-align:center;padding:4px 0;">
    <span style="color:#f9a825;font-weight:800;font-size:11px;">נכתב על ידי רובי דביר roobid@gmail.com</span>
</div>
<div class="header">
    <h1>🚌 זמני אוטובוס</h1>
    <div class="header-sub">
        <span class="dot dot-load" id="statusDot"></span>
        <span id="statusText">בחר תחנה</span>
    </div>
</div>

<div class="stop-buttons">
    <div class="btn-section-label lbl-base">🚌 לכיוון הבסיס</div>
    <div class="btn-grid" id="baseButtons"></div>
    <div class="btn-section-label lbl-home">🏠 חזרה הביתה</div>
    <div class="btn-grid" id="homeButtons"></div>
    <div class="btn-section-label" style="color:var(--primary)">🔍 תחנה אקראית</div>
    <div class="custom-search">
        <input type="text" id="customInput" placeholder="מספר תחנה..." dir="rtl" inputmode="numeric">
        <button onclick="searchCustom()">חפש</button>
        <button onclick="saveFavorite()" style="background:#f9a825;" title="שמור במועדפים">⭐</button>
    </div>
    <div class="btn-grid" id="favButtons" style="margin-top:6px;"></div>
</div>

<div class="toolbar">
    <button onclick="refreshCurrent()">רענן</button>
    <span class="timer" id="timerText"></span>
</div>

<div id="mainContent" style="padding:0 12px;"></div>

<div class="footer">
    נתונים: SIRI זמן אמת — משרד התחבורה (via curlbus.app)<br>
    עדכון אחרון: <span id="lastRefresh">-</span>
</div>

<script>
// ===== Stops Data =====
const STOPS = [
    {
        code: '37018',
        name: 'מהשכונה טשרנחובסקי ויצמן',
        desc: 'ממש ליד השכרת רכב בשכונה',
        lines: ['640','468'],
        dir: 'base',
        img: '37018.jpg'
    },
    {
        code: '22942',
        name: 'מחלף גבעת שמואל/כביש 4',
        desc: 'ממש ליד מפעל קוקה קולה',
        lines: ['354','318'],
        dir: 'base',
        img: '22942.jpg'
    },
    {
        code: '33737',
        name: 'צומת בית דגן',
        desc: 'מפה ישירות לבסיס',
        lines: ['411','433'],
        dir: 'base',
        img: '33737.jpg'
    },
    {
        code: '32465',
        name: 'מליד העבודה של אבא',
        desc: 'ישיר עד הבסיס',
        lines: ['249'],
        dir: 'base',
        img: '32465.jpg'
    },
    {
        code: '33442',
        name: 'חזור מהבסיס תחנה שחורה',
        desc: '249 הלעבודה של אבא. האחרים לצומת בית דגן.',
        lines: ['249','411','458'],
        dir: 'home',
        img: '33442.jpg'
    },
    {
        code: '33440',
        name: 'צומת בית דגן',
        desc: 'נוסעים לגבעת שמואל תחנה',
        lines: ['20055'],
        dir: 'home',
        img: '33440.jpg'
    },
    {
        code: '21257',
        name: 'מיד אחרי גשר גבעת שמואל לכיוון',
        desc: 'קווים ישירים לכפר סבא',
        lines: ['640','468'],
        dir: 'home',
        img: '21257.jpg'
    }
];

const CURLBUS = 'https://curlbus.app';
const PROXY = 'https://corsproxy.io/?';
const REFRESH_SEC = 60;
let refreshTimer = null;
let countdownTimer = null;
let countdown = REFRESH_SEC;
let currentStop = null; // currently selected stop object
let isCustom = false;

// ===== Helpers =====
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }


// ===== Build buttons =====
function buildButtons() {
    const baseGrid = document.getElementById('baseButtons');
    const homeGrid = document.getElementById('homeButtons');
    STOPS.forEach((s, i) => {
        const btn = document.createElement('button');
        btn.className = 'stop-btn ' + (s.dir === 'base' ? 'btn-base' : 'btn-home');
        btn.textContent = s.name;
        btn.title = s.code + ' — ' + s.desc;
        btn.dataset.idx = i;
        btn.onclick = () => selectStop(i);
        if (s.dir === 'base') baseGrid.appendChild(btn);
        else homeGrid.appendChild(btn);
    });
}

function highlightBtn(idx) {
    document.querySelectorAll('.stop-btn').forEach(b => b.classList.remove('active'));
    if (idx !== null) {
        const btn = document.querySelector(`.stop-btn[data-idx="${idx}"]`);
        if (btn) btn.classList.add('active');
    }
}

// ===== Select stop =====
function selectStop(idx) {
    isCustom = false;
    currentStop = { ...STOPS[idx], _idx: idx };
    highlightBtn(idx);
    renderCard(currentStop);
    loadStop(currentStop);
    startAutoRefresh();
}

function selectCustomStop(code, name) {
    isCustom = true;
    currentStop = { code, name: name || 'תחנה ' + code, desc: '', lines: [], dir: 'custom', img: '' };
    highlightBtn(null);
    renderCard(currentStop);
    loadStop(currentStop);
    startAutoRefresh();
}

// ===== Render single card =====
function renderCard(stop) {
    const main = document.getElementById('mainContent');
    let bgClass, dirClass;
    if (stop.dir === 'base') { bgClass = 'bg-green'; dirClass = 'dir-base'; }
    else if (stop.dir === 'home') { bgClass = 'bg-red'; dirClass = 'dir-home'; }
    else { bgClass = 'bg-blue'; dirClass = 'dir-custom'; }

    const imgSrc = stop.img ? ('images/' + stop.img) : '';
    const bottomImgs = ['22942','32465'];
    const imgExtra = bottomImgs.includes(stop.code) ? ' img-bottom' : '';
    const imgHtml = imgSrc
        ? `<img class="stop-img${imgExtra}" src="${imgSrc}" alt="${esc(stop.name)}" onerror="this.outerHTML='<div class=stop-img-placeholder>📷</div>'">`
        : '';
    const descHtml = stop.desc ? `<div class="stop-desc">${esc(stop.desc)}</div>` : '';

    main.innerHTML = `
    <div class="stop-card ${dirClass}">
        <div class="stop-header ${bgClass}">
            <span class="stop-name">${esc(stop.name)}</span>
            <span class="stop-code">${esc(stop.code)}</span>
        </div>
        ${descHtml}
        ${imgHtml}
        <div class="stop-body" id="stopBody">
            <div class="stop-loading"><div class="spinner"></div>טוען...</div>
        </div>
    </div>`;
}

// ===== Fetch (curlbus.app — real-time SIRI) =====
async function loadStop(stop) {
    const body = document.getElementById('stopBody');
    if (!body) return;

    document.getElementById('statusDot').className = 'dot dot-load';
    document.getElementById('statusText').textContent = 'מעדכן...';

    try {
        const now = new Date();
        const targetUrl = `${CURLBUS}/${stop.code}`;
        const resp = await fetch(PROXY + encodeURIComponent(targetUrl), {
            headers: { 'Accept': 'application/json' }
        });
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const json = await resp.json();

        // Update stop name from curlbus for custom stops
        if (isCustom && json.stop_info) {
            const nameEl = document.querySelector('.stop-name');
            if (nameEl && json.stop_info.name && json.stop_info.name.HE) {
                nameEl.textContent = json.stop_info.name.HE;
                currentStop.name = json.stop_info.name.HE;
            }
            if (json.stop_info.address) {
                const city = json.stop_info.address.city_multilingual?.HE || json.stop_info.address.city || '';
                if (city) {
                    let descEl = document.querySelector('.stop-desc');
                    if (!descEl) {
                        const header = document.querySelector('.stop-header');
                        if (header) {
                            descEl = document.createElement('div');
                            descEl.className = 'stop-desc';
                            header.after(descEl);
                        }
                    }
                    if (descEl) descEl.textContent = city;
                }
            }
        }

        const visits = json.visits && json.visits[stop.code] ? json.visits[stop.code] : [];
        renderArrivals(body, visits, now, stop.lines || []);

        const ts = now.toLocaleTimeString('he-IL', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
        document.getElementById('lastRefresh').textContent = ts;
        document.getElementById('statusDot').className = 'dot dot-ok';
        document.getElementById('statusText').textContent = '🛰️ זמן אמת (GPS)';
    } catch(e) {
        body.innerHTML = `<div class="stop-error">⚠️ שגיאה: ${esc(e.message)}</div>`;
        document.getElementById('statusDot').className = 'dot dot-err';
        document.getElementById('statusText').textContent = 'שגיאה';
    }
    countdown = REFRESH_SEC;
}

function renderArrivals(body, visits, now, relevantLines) {
    if (!visits || visits.length === 0) {
        body.innerHTML = '<div class="no-data">אין אוטובוסים קרובים כרגע</div>';
        return;
    }

    const seen = new Set();
    const arrivals = visits.filter(v => {
        const key = (v.line_name||'') + '_' + v.eta;
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
    }).map(v => {
        const eta = v.eta ? new Date(v.eta.replace(' ','T')) : null;
        const min = eta ? Math.round((eta - now) / 60000) : null;
        const lineNum = v.line_name || '?';
        const dest = v.static_info?.route?.headsign || '';
        return {
            line: lineNum,
            dest,
            minutes: min,
            hasGps: !!(v.location && v.location.lat),
            isRelevant: relevantLines.length > 0 && relevantLines.includes(lineNum)
        };
    }).filter(a => a.minutes !== null && a.minutes >= -2)
      .sort((a,b) => {
          if (a.isRelevant && !b.isRelevant) return -1;
          if (!a.isRelevant && b.isRelevant) return 1;
          return a.minutes - b.minutes;
      })
      .slice(0, 12);

    if (arrivals.length === 0) {
        body.innerHTML = '<div class="no-data">אין אוטובוסים קרובים כרגע</div>';
        return;
    }

    body.innerHTML = arrivals.map(a => {
        let cls, txt;
        if (a.minutes <= 1) { cls = 'eta-now'; txt = 'עכשיו'; }
        else if (a.minutes <= 5) { cls = 'eta-soon'; txt = a.minutes + " דק'"; }
        else { cls = 'eta-normal'; txt = a.minutes + " דק'"; }

        let dest = a.dest;
        if (dest) {
            const parts = dest.split('-');
            if (parts.length >= 2) dest = parts[parts.length-1].trim();
            if (dest.length > 30) dest = dest.substring(0,30) + '...';
        }

        const gpsIcon = a.hasGps ? '<span title="מאומת GPS" style="font-size:10px;">🛰️</span>' : '';

        const rowClass = a.isRelevant ? 'bus-row relevant' : 'bus-row';
        const lineClass = a.isRelevant ? 'bus-line highlight' : 'bus-line';
        const destClass = a.isRelevant ? 'bus-dest bold' : 'bus-dest';

        return `
            <div class="${rowClass}">
                <div class="${lineClass}">${esc(a.line)} ${gpsIcon}</div>
                <div class="${destClass}">${esc(dest)}</div>
                <div class="bus-eta ${cls}">${txt}</div>
            </div>`;
    }).join('');
}

// ===== Custom search =====
function searchCustom() {
    const val = document.getElementById('customInput').value.trim();
    if (!val) return;
    if (/^\d+$/.test(val)) {
        selectCustomStop(val);
    } else {
        selectCustomStop(val, val);
    }
}

// ===== Favorites (localStorage) =====
function getFavorites() {
    try { return JSON.parse(localStorage.getItem('bus_favorites') || '[]'); }
    catch(e) { return []; }
}

function saveFavorite() {
    if (!currentStop || !isCustom) {
        alert('חפש תחנה אקראית קודם, ואז לחץ ⭐ לשמור');
        return;
    }
    const favs = getFavorites();
    if (favs.find(f => f.code === currentStop.code)) {
        alert('התחנה כבר במועדפים');
        return;
    }
    const name = document.querySelector('.stop-name')?.textContent || currentStop.name;
    favs.push({ code: currentStop.code, name });
    localStorage.setItem('bus_favorites', JSON.stringify(favs));
    renderFavorites();
}

function removeFavorite(code) {
    let favs = getFavorites().filter(f => f.code !== code);
    localStorage.setItem('bus_favorites', JSON.stringify(favs));
    renderFavorites();
}

function renderFavorites() {
    const grid = document.getElementById('favButtons');
    const favs = getFavorites();
    if (favs.length === 0) { grid.innerHTML = ''; return; }
    grid.innerHTML = favs.map(f => `
        <button class="stop-btn" style="background:#7b1fa2;position:relative;" onclick="selectCustomStop('${esc(f.code)}','${esc(f.name)}')">
            ${esc(f.name)}
            <span onclick="event.stopPropagation();removeFavorite('${esc(f.code)}')" style="position:absolute;top:1px;left:3px;font-size:9px;cursor:pointer;">✕</span>
        </button>
    `).join('');
}

// ===== Refresh =====
function refreshCurrent() {
    if (!currentStop) return;
    renderCard(currentStop);
    loadStop(currentStop);
}

function startAutoRefresh() {
    if (refreshTimer) clearInterval(refreshTimer);
    if (countdownTimer) clearInterval(countdownTimer);
    refreshTimer = setInterval(() => {
        if (currentStop) {
            const body = document.getElementById('stopBody');
            if (body) loadStop(currentStop);
        }
    }, REFRESH_SEC * 1000);
    countdownTimer = setInterval(() => {
        countdown--;
        if (countdown < 0) countdown = REFRESH_SEC;
        document.getElementById('timerText').textContent = 'רענון בעוד ' + countdown + ' שניות';
    }, 1000);
    countdown = REFRESH_SEC;
}

// Enter key on custom input
document.getElementById('customInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') searchCustom();
});

// ===== Init =====
buildButtons();
renderFavorites();
document.getElementById('mainContent').innerHTML = '<div style="text-align:center;padding:40px 20px;color:#999;font-size:15px;">👆 בחר תחנה מהכפתורים למעלה</div>';
</script>
