<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>זמני אוטובוס</title>
    <meta name="theme-color" content="#1a73e8">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚌</text></svg>">
    <style>
        :root {
            --primary: #1a73e8;
            --primary-dark: #1557b0;
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --text: #1a1a2e;
            --text-muted: #6b7280;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            --green-bg: #c8f7c5;
            --green-header: #2e7d32;
            --green-btn: #43a047;
            --red-bg: #fdd;
            --red-header: #c62828;
            --red-btn: #e53935;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
            --radius: 14px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        .header {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            padding: 14px 16px 10px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 12px rgba(26,115,232,0.3);
        }
        .header h1 { font-size: 20px; font-weight: 700; margin-bottom: 3px; }
        .header-sub {
            font-size: 11px;
            opacity: 0.85;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .header-sub .dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            display: inline-block;
        }
        .dot-ok { background: var(--success); animation: pulse 2s infinite; }
        .dot-err { background: var(--danger); }
        .dot-load { background: var(--warning); animation: pulse 0.8s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

        /* Stop selector buttons */
        .stop-buttons {
            background: white;
            padding: 10px 10px 8px;
            border-bottom: 1px solid #e5e7eb;
        }
        .btn-section-label {
            font-size: 11px;
            font-weight: 700;
            margin-bottom: 5px;
            padding-right: 4px;
        }
        .btn-section-label.lbl-base { color: var(--green-header); }
        .btn-section-label.lbl-home { color: var(--red-header); }
        .btn-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-bottom: 8px;
        }
        .stop-btn {
            border: none;
            border-radius: 8px;
            padding: 6px 8px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            color: white;
            flex: 1;
            min-width: 0;
            white-space: normal;
            line-height: 1.3;
            max-height: 42px;
            overflow: hidden;
            text-align: center;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .stop-btn:active { transform: scale(0.96); }
        .stop-btn.btn-base { background: var(--green-btn); }
        .stop-btn.btn-home { background: var(--red-btn); }
        .stop-btn.active { box-shadow: 0 0 0 3px rgba(0,0,0,0.3); transform: scale(1.03); }

        /* Custom stop search */
        .custom-search {
            display: flex;
            gap: 6px;
            margin-top: 2px;
            align-items: center;
        }
        .custom-search input {
            flex: 1;
            padding: 7px 10px;
            border: 1.5px solid #d1d5db;
            border-radius: 8px;
            font-size: 13px;
            font-family: inherit;
        }
        .custom-search input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 2px rgba(26,115,232,0.2); }
        .custom-search button {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 7px 14px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            white-space: nowrap;
        }

        /* Toolbar */
        .toolbar {
            background: #fafafa;
            padding: 6px 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border-bottom: 1px solid #e5e7eb;
        }
        .toolbar button {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 5px 12px;
            font-size: 12px;
            cursor: pointer;
            font-family: inherit;
        }
        .toolbar .timer { font-size: 11px; color: var(--text-muted); }

        /* Single stop card */
        .stop-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            max-width: 600px;
            margin: 12px auto;
        }
        .stop-card.dir-base { border-right: 5px solid var(--green-header); }
        .stop-card.dir-home { border-right: 5px solid var(--red-header); }
        .stop-card.dir-custom { border-right: 5px solid var(--primary); }

        .stop-header {
            padding: 12px 14px 6px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .stop-header.bg-green { background: var(--green-bg); }
        .stop-header.bg-red { background: var(--red-bg); }
        .stop-header.bg-blue { background: #e3f2fd; }

        .stop-name { font-size: 16px; font-weight: 700; }
        .stop-code {
            font-size: 12px;
            color: var(--text-muted);
            background: rgba(255,255,255,0.7);
            padding: 2px 8px;
            border-radius: 10px;
            font-family: monospace;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .copy-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 13px;
            padding: 0 2px;
            opacity: 0.6;
            transition: opacity 0.2s;
        }
        .copy-btn:hover { opacity: 1; }
        .copy-btn.copied { opacity: 1; }
        .loc-btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: rgba(255,255,255,0.85);
            border: 1px solid #ddd;
            border-radius: 16px;
            padding: 3px 10px;
            font-size: 12px;
            color: #1a73e8;
            cursor: pointer;
            margin: 4px 14px 0;
            text-decoration: none;
            transition: background 0.2s;
        }
        .loc-btn:hover { background: #e8f0fe; }
        .stop-desc {
            font-size: 13px;
            color: var(--text-muted);
            padding: 4px 14px 8px;
            border-bottom: 1px solid #f3f4f6;
        }
        .stop-img {
            width: 100%;
            height: 140px;
            object-fit: cover;
            display: block;
        }
        .stop-img.img-bottom { object-position: center bottom; }
        .stop-img.img-75 { object-position: center 85%; }
        .stop-img-placeholder {
            width: 100%;
            height: 70px;
            background: #f3f4f6;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #aaa;
        }
        .stop-body { padding: 8px 14px 14px; }

        /* Bus rows */
        .bus-row {
            display: flex;
            align-items: center;
            padding: 8px 6px;
            margin-bottom: 3px;
            border-radius: 8px;
            background: #fafafa;
        }
        .bus-row.relevant {
            background: repeating-linear-gradient(
                -45deg,
                #fff8e1,
                #fff8e1 6px,
                #fff3cd 6px,
                #fff3cd 12px
            );
            border: 2px solid #ff8f00;
            border-radius: 10px;
            padding: 8px 6px;
        }

        .bus-line {
            background: var(--primary);
            color: white;
            font-weight: 700;
            font-size: 14px;
            min-width: 48px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: 10px;
            flex-shrink: 0;
        }
        .bus-line.highlight {
            background: #e65100;
            font-size: 17px;
            min-width: 56px;
            height: 36px;
            box-shadow: 0 2px 8px rgba(230,81,0,0.4);
        }

        .bus-dest {
            flex: 1;
            font-size: 13px;
            overflow: hidden;
        }
        .bus-dest.bold { font-weight: 800; font-size: 14px; color: #e65100; }
        .bus-stops-away {
            font-size: 12px; font-weight: 800; color: #d84315;
            background: #fbe9e7; border-radius: 8px; padding: 2px 8px;
            display: inline-block; margin-top: 1px;
            border: 1px solid #ffccbc;
        }
        .line-filters {
            display: flex; flex-wrap: wrap; gap: 6px; padding: 8px 4px;
            border-bottom: 1px solid #e0e0e0; margin-bottom: 4px;
        }
        .line-filter-btn {
            font-size: 13px; font-weight: 700; padding: 4px 14px;
            border-radius: 16px; border: 2px solid #1565c0;
            background: #fff; color: #1565c0; cursor: pointer;
            transition: all 0.2s;
        }
        .line-filter-btn.active {
            background: #1565c0; color: #fff;
        }
        .line-filter-btn:hover { opacity: 0.85; }

        .bus-info {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 1px;
            flex-shrink: 0;
            min-width: 80px;
        }
        .bus-eta {
            font-size: 15px;
            font-weight: 700;
            text-align: center;
        }
        .bus-meta {
            font-size: 10px;
            color: #999;
            text-align: center;
            white-space: nowrap;
        }
        .eta-now { color: #fff; background: #22c55e; border-radius: 8px; padding: 2px 8px; animation: pulse 1s infinite; }
        .eta-gps { color: #22c55e; font-weight: 800; }
        .eta-soon { color: var(--warning); font-size: 16px; }
        .eta-normal { color: var(--text); }
        .eta-legend {
            display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
            padding: 8px 14px; font-size: 11px; color: #666;
        }
        .eta-legend span { display: inline-flex; align-items: center; gap: 3px; }
        .legend-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
        .legend-green { background: #22c55e; }
        .legend-orange { background: #f59e0b; }
        .legend-black { background: #1a1a2e; }

        .no-data {
            text-align: center;
            padding: 20px 0;
            color: var(--text-muted);
            font-size: 14px;
        }
        .stop-loading {
            text-align: center;
            padding: 20px 0;
            color: var(--text-muted);
            font-size: 13px;
        }
        .spinner {
            width: 24px; height: 24px;
            border: 2.5px solid #e5e7eb;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .stop-error {
            text-align: center;
            padding: 14px 0;
            color: var(--danger);
            font-size: 13px;
        }

        .footer {
            text-align: center;
            padding: 16px;
            font-size: 11px;
            color: var(--text-muted);
        }

        /* Line detail modal */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5); z-index: 1000;
            display: flex; align-items: center; justify-content: center;
            padding: 16px;
        }
        .modal-card {
            background: #fff; border-radius: 16px; width: 100%; max-width: 380px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.3); overflow: hidden;
            animation: slideUp 0.25s ease;
        }
        @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .modal-header {
            display: flex; align-items: center; gap: 12px;
            padding: 16px; background: var(--primary); color: #fff;
        }
        .modal-line-num {
            font-size: 28px; font-weight: 800;
            background: rgba(255,255,255,0.2); border-radius: 10px;
            min-width: 60px; height: 44px;
            display: flex; align-items: center; justify-content: center;
        }
        .modal-dest { font-size: 15px; font-weight: 600; flex: 1; }
        .modal-operator { font-size: 11px; opacity: 0.8; margin-top: 2px; }
        .modal-body { padding: 14px 16px; }
        .modal-times { display: flex; flex-wrap: wrap; gap: 8px; margin: 8px 0 14px; }
        .modal-time-chip {
            background: #f0fdf4; color: #22c55e; font-weight: 700;
            padding: 6px 14px; border-radius: 20px; font-size: 14px;
            border: 1px solid #bbf7d0;
        }
        .modal-time-chip:first-child { background: #22c55e; color: #fff; border-color: #22c55e; }
        .modal-section { font-size: 12px; color: #888; margin-bottom: 4px; font-weight: 600; }
        .modal-btns { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
        .modal-nav-btn {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            width: 100%; padding: 12px; border: none; border-radius: 12px;
            background: #7b1fa2; color: #fff; font-size: 15px; font-weight: 700;
            cursor: pointer; text-decoration: none;
        }
        .modal-nav-btn:hover { background: #6a1b9a; }
        .modal-nav-btn.secondary {
            background: #1a73e8; font-size: 13px; padding: 10px;
        }
        .modal-nav-btn.secondary:hover { background: #1557b0; }
        .modal-close {
            display: block; text-align: center; padding: 12px;
            color: #888; font-size: 13px; cursor: pointer;
            border-top: 1px solid #f3f4f6;
        }
        .modal-close:hover { background: #f9fafb; }

        /* Boarding wizard */
        .boarding-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6); z-index: 2000;
            display: flex; align-items: center; justify-content: center;
            padding: 16px;
        }
        .boarding-card {
            background: #fff; border-radius: 16px; width: 100%; max-width: 380px;
            max-height: 90vh; overflow-y: auto;
            box-shadow: 0 12px 40px rgba(0,0,0,0.3); animation: slideUp 0.25s ease;
        }
        .boarding-header {
            background: #e65100; color: #fff; padding: 16px; text-align: center;
            border-radius: 16px 16px 0 0; font-weight: 800; font-size: 18px;
        }
        .boarding-body { padding: 16px; direction: rtl; }
        .boarding-label { font-size: 14px; color: #555; margin-bottom: 8px; font-weight: 600; }
        .boarding-input {
            width: 100%; padding: 12px; border: 2px solid #e5e7eb; border-radius: 12px;
            font-size: 18px; text-align: center; font-weight: 700; direction: ltr;
        }
        .boarding-input:focus { border-color: #e65100; outline: none; }
        .boarding-btn {
            width: 100%; padding: 12px; border: none; border-radius: 12px;
            font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 8px;
        }
        .boarding-btn-primary { background: #e65100; color: #fff; }
        .boarding-btn-primary:hover { background: #bf360c; }
        .boarding-btn-dir {
            background: #f3e5f5; color: #7b1fa2; border: 2px solid #ce93d8;
            text-align: right; padding: 14px; margin-top: 8px; border-radius: 12px;
            cursor: pointer; font-size: 15px; font-weight: 700; width: 100%;
        }
        .boarding-btn-dir:hover { background: #e1bee7; }
        .boarding-btn-op {
            background: #e3f2fd; color: #1565c0; border: 2px solid #90caf9;
            text-align: right; padding: 12px; margin-top: 6px; font-size: 13px;
            border-radius: 12px; cursor: pointer; font-weight: 700; width: 100%;
        }
        .boarding-btn-op:hover { background: #bbdefb; }
        .boarding-stops {
            max-height: 280px; overflow-y: auto; margin-top: 8px;
            border: 1px solid #e5e7eb; border-radius: 10px;
        }
        .boarding-stop-item {
            padding: 10px 14px; border-bottom: 1px solid #f3f4f6;
            cursor: pointer; font-size: 13px; display: flex; justify-content: space-between; align-items: center;
        }
        .boarding-stop-item:hover { background: #fff3e0; }
        .boarding-stop-item:last-child { border-bottom: none; }
        .boarding-stop-item:nth-child(odd) { background: #fafafa; }
        .boarding-stop-item:nth-child(odd):hover { background: #fff3e0; }
        .boarding-stop-city { color: #888; font-size: 11px; }
        .boarding-close {
            display: block; text-align: center; padding: 12px;
            color: #888; font-size: 13px; cursor: pointer;
            border-top: 1px solid #f3f4f6; border-radius: 0 0 16px 16px;
        }
        .boarding-close:hover { background: #f9fafb; }
        .boarding-info { background: #fff3e0; border-radius: 10px; padding: 12px; margin-top: 10px; font-size: 12px; color: #e65100; text-align: center; }
        .boarding-spinner { width: 24px; height: 24px; border: 3px solid #e5e7eb; border-top-color: #e65100; border-radius: 50%; animation: spin 0.7s linear infinite; margin: 16px auto; }
        .alert-active-screen { text-align: center; padding: 20px 0; }
        .alert-dest-name { font-size: 18px; font-weight: 800; color: #e65100; margin: 10px 0; }
        .alert-distance { font-size: 32px; font-weight: 900; color: #1a73e8; margin: 10px 0; }
        .alert-status { font-size: 14px; color: #888; }
        .alert-arrived { background: #22c55e; color: #fff; padding: 20px; border-radius: 12px; font-size: 20px; font-weight: 800; margin-top: 16px; animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .boarding-boarded-btn {
            display: block; width: calc(100% - 24px); margin: 12px auto;
            padding: 14px; background: #e65100; color: #fff; border: none;
            border-radius: 14px; font-size: 17px; font-weight: 800;
            cursor: pointer; text-align: center;
        }
        .boarding-boarded-btn:hover { background: #bf360c; }
    </style>
</head>
<body>

<div style="background:#333;text-align:center;padding:4px 0;">
    <span style="color:#f9a825;font-weight:800;font-size:11px;">נכתב על ידי רובי דביר roobid@gmail.com</span>
</div>
<div class="header">
    <h1>🚌 זמני אוטובוס</h1>
    <div class="header-sub">
        <span class="dot dot-load" id="statusDot"></span>
        <span id="statusText">בחר תחנה</span>
    </div>
</div>

<div class="stop-buttons">
    <div class="btn-section-label lbl-base">🚌 לכיוון הבסיס</div>
    <div class="btn-grid" id="baseButtons"></div>
    <div class="btn-section-label lbl-home">🏠 חזרה הביתה</div>
    <div class="btn-grid" id="homeButtons"></div>
    <div class="btn-section-label" style="color:var(--primary)">🔍 תחנה אקראית</div>
    <div class="custom-search">
        <input type="text" id="customInput" placeholder="מספר תחנה..." dir="rtl" inputmode="numeric">
        <button onclick="searchCustom()">חפש</button>
        <button onclick="saveFavorite()" style="background:#f9a825;" title="שמור במועדפים">⭐</button>
    </div>
    <div class="btn-grid" id="favButtons" style="margin-top:6px;"></div>
    <button class="boarding-boarded-btn" onclick="startBoarding()">🚌 עליתי לאוטובוס</button>
</div>

<div class="toolbar">
    <button onclick="refreshCurrent()">רענן</button>
    <span class="timer" id="timerText"></span>
</div>

<div id="mainContent" style="padding:0 12px;"></div>

<div class="footer">
    נתונים: זמן אמת — משרד התחבורה (bus.gov.il)<br>
    עדכון אחרון: <span id="lastRefresh">-</span>
</div>

const REFRESH_SEC = 30;

let countdownTimer = null;

// ===== Helpers =====
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function copyCode(code, btn) {
    navigator.clipboard.writeText(code).then(() => {
        const orig = btn.textContent;
        btn.textContent = '✓';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 1500);
    });
}

async function fetchAndOpenMap(code) {
    try {
        const resp = await fetch(`${GTFS_API}/gtfs_stops/list?code=${code}&limit=1`);
        const raw = await resp.json();
        const stops = raw.value || raw;
        if (stops.length > 0 && stops[0].lat && stops[0].lon) {
            window.open(`https://www.google.com/maps?q=${stops[0].lat},${stops[0].lon}`, '_blank');
        } else {
            window.open(`https://www.google.com/maps/search/bus+stop+${code}+israel`, '_blank');
        }
    } catch(e) {
        window.open(`https://www.google.com/maps/search/bus+stop+${code}+israel`, '_blank');
    }
}

function toISOLocal(d) {
    const off = d.getTimezoneOffset();
    const sign = off <= 0 ? '+' : '-';
    const h = String(Math.floor(Math.abs(off)/60)).padStart(2,'0');
    const m = String(Math.abs(off)%60).padStart(2,'0');
    const iso = new Date(d.getTime() - off*60000).toISOString().replace('Z','');
    return iso + sign + h + ':' + m;
}


// ===== Build buttons =====
function buildButtons() {
    const baseGrid = document.getElementById('baseButtons');
    const homeGrid = document.getElementById('homeButtons');
    STOPS.forEach((s, i) => {
        const btn = document.createElement('button');
        btn.className = 'stop-btn ' + (s.dir === 'base' ? 'btn-base' : 'btn-home');
        btn.textContent = s.name;
        btn.title = s.code + ' — ' + s.desc;
        btn.dataset.idx = i;
        btn.onclick = () => selectStop(i);
        if (s.dir === 'base') baseGrid.appendChild(btn);
        else homeGrid.appendChild(btn);
    });
}

function highlightBtn(idx) {
    document.querySelectorAll('.stop-btn').forEach(b => b.classList.remove('active'));
    if (idx !== null) {
        const btn = document.querySelector(`.stop-btn[data-idx="${idx}"]`);
        if (btn) btn.classList.add('active');

}

// ===== Fetch: bus.gov.il (real-time MOT), fallback to GTFS =====
async function loadStop(stop) {
    const body = document.getElementById('stopBody');
    if (!body) return;

    document.getElementById('statusDot').className = 'dot dot-load';
    document.getElementById('statusText').textContent = 'מעדכן...';

    const now = new Date();
    let source = '';

    try {
        // Primary: bus.gov.il real-time SIRI (MOT official)
        const motUrl = `${MOT_API}/GetRealtimeBusLineListByBustop/${stop.code}/he/false?_t=${Date.now()}`;
        const proxies = [
            PROXY,
            'https://api.allorigins.win/raw?url=',
            'https://api.codetabs.com/v1/proxy?quest='
        ];
        let raw = null;
        for (const px of proxies) {
            try {
                const ctrl = new AbortController();
                const tid = setTimeout(() => ctrl.abort(), 8000);
                const resp = await fetch(px + encodeURIComponent(motUrl), { signal: ctrl.signal, cache: 'no-store', headers: {'Cache-Control':'no-cache','Pragma':'no-cache'} });
                clearTimeout(tid);
                if (!resp.ok) continue;
                raw = await resp.json();
                if (raw && (Array.isArray(raw) || raw.value)) break;
                raw = null;
            } catch(_) { continue; }
        }
        if (!raw) throw new Error('MOT: all proxies failed');
        // API returns {value:[...], Count:N} or plain array
        const lines = Array.isArray(raw) ? raw : (raw.value || []);

        // Update stop name for custom stops
        if (isCustom && lines.length > 0 && lines[0].BusstopHebrewName) {
            const nameEl = document.querySelector('.stop-name');
            if (nameEl) {
                nameEl.textContent = lines[0].BusstopHebrewName;
                currentStop.name = lines[0].BusstopHebrewName;
            }
        }

        lastMotLines = lines;
        const arrivals = parseMotData(lines, stop.lines || []);
        renderArrivals(body, arrivals, 'realtime');
        source = 'realtime';

    } catch(e1) {
        // Fallback to GTFS planned schedule
        try {
            const later = new Date(now.getTime() + 90 * 60000);
            const from = toISOLocal(now);
            const to = toISOLocal(later);
            const today = now.toISOString().split('T')[0];

            const url = `${GTFS_API}/gtfs_ride_stops/list?` +
                `gtfs_stop__code=${stop.code}` +
                `&gtfs_stop__date_from=${today}&gtfs_stop__date_to=${today}` +
                `&arrival_time_from=${encodeURIComponent(from)}` +
                `&arrival_time_to=${encodeURIComponent(to)}` +
                `&limit=25` +
                `&order_by=arrival_time asc`;

            const resp2 = await fetch(url + '&_t=' + Date.now(), { cache: 'no-store' });
            if (!resp2.ok) throw new Error('HTTP ' + resp2.status);
            const data = await resp2.json();

            if (isCustom && data.length > 0 && data[0].gtfs_stop__name) {
                const nameEl = document.querySelector('.stop-name');
                if (nameEl) nameEl.textContent = data[0].gtfs_stop__name;
            }

            const arrivals = parseGtfsData(data, now, stop.lines || []);
            renderArrivals(body, arrivals, 'planned');
            source = 'planned';

        } catch(e2) {
            body.innerHTML = `<div class="stop-error">⚠️ שגיאה: ${esc(e2.message)}</div>`;
            document.getElementById('statusDot').className = 'dot dot-err';
            document.getElementById('statusText').textContent = 'שגיאה';
            countdown = REFRESH_SEC;
            return;
        }
    }

    const ts = now.toLocaleTimeString('he-IL', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
    document.getElementById('lastRefresh').textContent = ts;
    document.getElementById('statusDot').className = 'dot dot-ok';
    document.getElementById('statusText').textContent = source === 'realtime'
        ? '🛰️ זמן אמת — משרד התחבורה'
        : '📋 לוח זמנים מתוכנן';
    countdown = REFRESH_SEC;
}

// Parse bus.gov.il real-time MOT data
function parseMotData(lines, relevantLines) {
    // Expand MinutesToArrivalList: each line can have multiple upcoming arrivals
    const expanded = [];
    (lines || []).forEach(ln => {
        const lineNum = String(ln.Shilut || '?');
        const dest = ln.DestinationQuarterName || ln.Description || '';
        const company = ln.CompanyHebrewName || '';
        const isRealtime = ln.ResponseSuccesed === true;
        const arrList = ln.MinutesToArrivalList || (ln.MinutesToArrival != null ? [ln.MinutesToArrival] : []);
        arrList.forEach((min, idx) => {
            // Estimate stops away: urban ~1.5 min/stop, intercity ~3 min/stop
            const isExpress = ln.TripsPerDay && ln.TripsPerDay < 20;
            const avgMinPerStop = isExpress ? 3 : 1.5;
            const stopsAway = min <= 0 ? 0 : Math.max(1, Math.round(min / avgMinPerStop));
            // Bus ID: MotLineId + direction + serial index
            const busId = `${ln.MotLineId || lineNum}-${ln.MotDirection || 0}-${idx+1}`;
            expanded.push({
                line: lineNum,
                dest,
                company,
                minutes: min,
                stopsAway,
                busId,
                busSerial: idx + 1,
                totalBuses: arrList.length,
                hasGps: isRealtime,
                isPlanned: false,
                isRelevant: relevantLines.length > 0 && relevantLines.includes(lineNum)
            });
        });
    });
    return expanded
        .filter(a => a.minutes >= -2)
        .sort((a,b) => {
            if (a.isRelevant && !b.isRelevant) return -1;
            if (!a.isRelevant && b.isRelevant) return 1;
            return a.minutes - b.minutes;
        })
        .slice(0, 15);
}

// Parse GTFS planned data (fallback)
function parseGtfsData(data, now, relevantLines) {
    const seen = new Set();
    return data.filter(d => {
        const key = (d.gtfs_route__route_short_name||'') + '_' + d.arrival_time;
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
    }).map(d => {
        const eta = d.arrival_time ? new Date(d.arrival_time) : null;
        const min = eta ? Math.round((eta - now) / 60000) : null;
        const lineNum = d.gtfs_route__route_short_name || '?';
        const dest = d.gtfs_route__route_long_name || '';
        return {
            line: lineNum,
            dest,
            company: d.gtfs_route__agency_name || '',
            minutes: min,
            hasGps: false,
            isPlanned: true,
            isRelevant: relevantLines.length > 0 && relevantLines.includes(lineNum)
        };
    }).filter(a => a.minutes !== null && a.minutes >= -2)
      .sort((a,b) => {
          if (a.isRelevant && !b.isRelevant) return -1;
          if (!a.isRelevant && b.isRelevant) return 1;
          return a.minutes - b.minutes;
      })
      .slice(0, 15);
}

// Unified render
function renderArrivals(body, arrivals, source) {
    lastArrivals = arrivals;
    lastArrivalSource = source;
    if (!arrivals || arrivals.length === 0) {
        body.innerHTML = '<div class="no-data">אין אוטובוסים קרובים כרגע</div>';
        return;
    }

    // Build filter buttons from unique line numbers
    const uniqueLines = [...new Set(arrivals.map(a => a.line))];
    let filterHtml = '';
    if (uniqueLines.length > 1) {
        filterHtml = '<div class="line-filters">' +
            uniqueLines.map(ln => {
                const cls = (activeLineFilter === ln) ? 'line-filter-btn active' : 'line-filter-btn';
                return `<button class="${cls}" onclick="toggleLineFilter('${esc(ln)}')">${esc(ln)}</button>`;
            }).join('') + '</div>';
    }

    // Filter arrivals if a filter is active
    const filtered = activeLineFilter
        ? arrivals.filter(a => a.line === activeLineFilter)
        : arrivals;

    body.innerHTML = filterHtml + filtered.map(a => {
        let cls, txt;
        // Real-time (MOT confirmed) = green always
        if (a.hasGps && a.minutes <= 0) { cls = 'eta-now'; txt = 'מגיע!'; }
        else if (a.hasGps) { cls = 'eta-gps'; txt = a.minutes + " דק'"; }
        else if (a.minutes <= 1) { cls = 'eta-soon'; txt = '~עכשיו'; }
        else if (a.minutes <= 5) { cls = 'eta-soon'; txt = a.minutes + " דק'"; }
        else { cls = 'eta-normal'; txt = a.minutes + " דק'"; }

        let dest = a.dest;
        if (dest) {
            const parts = dest.split('-');
            if (parts.length >= 2) dest = parts[parts.length-1].trim();
            if (dest.length > 25) dest = dest.substring(0,25) + '...';
        }

        const badge = a.hasGps ? ' 🛰️' : (a.isPlanned ? ' 📋' : '');

        // Calculate ETA clock time
        const etaTime = new Date(Date.now() + a.minutes * 60000);
        const etaClock = etaTime.toLocaleTimeString('he-IL', { hour:'2-digit', minute:'2-digit' });

        // Stops away indicator
        let stopsTag = '';
        if (a.hasGps && a.stopsAway != null && a.minutes > 0) {
            const stLabel = a.stopsAway === 1 ? 'תחנה אחת לפניך' : a.stopsAway + ' תחנות לפניך';
            stopsTag = `<div class="bus-stops-away">🚏 ${stLabel}</div>`;
        }


        const rowClass = a.isRelevant ? 'bus-row relevant' : 'bus-row';
        const lineClass = a.isRelevant ? 'bus-line highlight' : 'bus-line';
        const destClass = a.isRelevant ? 'bus-dest bold' : 'bus-dest';

        return `
            <div class="${rowClass}" data-busid="${esc(a.busId || '')}">
                <div class="${lineClass}" style="cursor:pointer" onclick="showLineModal('${esc(a.line)}')">${esc(a.line)}</div>
                <div class="${destClass}">${esc(dest)}${stopsTag}</div>
                <div class="bus-info">
                    <div class="bus-eta ${cls}">${txt}${badge}</div>
                    <div class="bus-meta">${etaClock}</div>
                </div>
            </div>`;
    }).join('');

    // Legend
    const legendSrc = source === 'realtime'
        ? '<span>🛰️ = זמן אמת (משרד התחבורה)</span>'
        : '<span>📋 = לוח מתוכנן בלבד</span>';
    body.innerHTML += `<div class="eta-legend">
        <span><i class="legend-dot legend-green"></i> זמן אמת מאומת</span>
        <span><i class="legend-dot legend-orange"></i> לא מאומת</span>
        ${legendSrc}
    </div>`;
}

// ===== Line detail modal =====
async function showLineModal(lineNum) {
    // Find this line in raw MOT data
    const ln = lastMotLines.find(l => String(l.Shilut) === lineNum);
    if (!ln) return;

    const dest = ln.DestinationQuarterName || ln.Description || '';
    const company = ln.CompanyHebrewName || '';
    const arrList = ln.MinutesToArrivalList || (ln.MinutesToArrival != null ? [ln.MinutesToArrival] : []);
    const stopName = ln.BusstopHebrewName || currentStop?.name || '';
    const desc = ln.Description || '';
    const destMakat = ln.DestinationMakat;
    const stopType = ln.BusstopType || '';
    const coCode = BUS_CO_IL[company];
    const motDir = ln.MotDirection || 1;

    // Build time chips with clock
    const now = Date.now();
    const chips = arrList.map(min => {
        const clock = new Date(now + min * 60000).toLocaleTimeString('he-IL', { hour:'2-digit', minute:'2-digit' });
        const label = min <= 0 ? 'מגיע!' : min + " דק'";
        return `<span class="modal-time-chip">${label} (${clock})</span>`;
    }).join('');

    // Build origin
    const origin = (currentStop?.lat && currentStop?.lon)
        ? `${currentStop.lat},${currentStop.lon}`
        : encodeURIComponent(stopName);

    // Try to get destination stop coordinates for precise navigation
    let destCoords = '';
    if (destMakat) {
        try {
            const r = await fetch(`${GTFS_API}/gtfs_stops/list?code=${destMakat}&limit=1`);
            const d = await r.json();
            const stops = d.value || d;
            if (stops.length > 0 && stops[0].lat && stops[0].lon) {
                destCoords = `${stops[0].lat},${stops[0].lon}`;
            }
        } catch(e) {}
    }
    const destination = destCoords || encodeURIComponent(dest);
    const mapsUrl = `https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${destination}&travelmode=transit`;

    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.onclick = (e) => { if (e.target === overlay) closeModal(); };
    overlay.innerHTML = `
        <div class="modal-card">
            <div class="modal-header">
                <div class="modal-line-num">${esc(lineNum)}</div>
                <div>
                    <div class="modal-dest">${esc(dest)}</div>
                    <div class="modal-operator">${esc(company)}</div>
                </div>
            </div>
            <div class="modal-body">
                <div class="modal-section">📍 תחנה: ${esc(stopName)} ${stopType ? '(' + esc(stopType) + ')' : ''}</div>
                <div class="modal-section" style="margin-top:6px">🗺️ מסלול: ${esc(desc)}</div>
                ${destMakat ? '<div class="modal-section" style="margin-top:4px;color:#1a73e8">🏁 תחנת יעד: ' + destMakat + '</div>' : ''}
                <div class="modal-section" style="margin-top:12px">⏱️ הגעות קרובות:</div>
                <div class="modal-times">${chips || '<span style="color:#aaa">אין נתונים</span>'}</div>
                <div class="modal-btns">
                    <div style="color:#e65100;font-size:12px;text-align:center;margin-bottom:4px">⚠️ שים לב לכיוון הנסיעה הנכון מבחינתך</div>
                    <button class="modal-nav-btn" onclick="window.open('${coCode
                        ? 'https://www.bus.co.il/OtobusimMVC/Line_Places/1010/' + lineNum + '_' + coCode + '_0'
                        : 'https://www.google.com/search?q=' + encodeURIComponent('קו ' + lineNum + ' ' + company + ' מסלול תחנות')
                    }','_blank')">
                        🗺️ מסלול קו ${esc(lineNum)} — כל התחנות
                    </button>
                    <button class="modal-nav-btn secondary" onclick="window.open('${mapsUrl}','_blank')">
                        📍 ניווט תחבורה ציבורית — Google Maps
                    </button>
                </div>
            </div>
            <div class="modal-close" onclick="closeModal()">סגור ✕</div>
        </div>`;
    document.body.appendChild(overlay);
}

// ===== Favorites (localStorage) =====
function getFavorites() {
    try { return JSON.parse(localStorage.getItem('bus_favorites') || '[]'); }
    catch(e) { return []; }
}

function saveFavorite() {
    if (!currentStop || !isCustom) {
        alert('חפש תחנה אקראית קודם, ואז לחץ ⭐ לשמור');
        return;
    }
    const favs = getFavorites();
    if (favs.find(f => f.code === currentStop.code)) {
        alert('התחנה כבר במועדפים');
        return;
    }
    const name = document.querySelector('.stop-name')?.textContent || currentStop.name;
    favs.push({ code: currentStop.code, name });
    localStorage.setItem('bus_favorites', JSON.stringify(favs));
    renderFavorites();
}

function removeFavorite(code) {
    let favs = getFavorites().filter(f => f.code !== code);
    localStorage.setItem('bus_favorites', JSON.stringify(favs));
    renderFavorites();
}

function renderFavorites() {
    const grid = document.getElementById('favButtons');
    const favs = getFavorites();
    if (favs.length === 0) { grid.innerHTML = ''; return; }
    grid.innerHTML = favs.map(f => `
        <button class="stop-btn" style="background:#7b1fa2;position:relative;" onclick="selectCustomStop('${esc(f.code)}','${esc(f.name)}')">
            ${esc(f.name)}

    `).join('');
}

// ===== Refresh =====
function refreshCurrent() {
    if (!currentStop) return;
    renderCard(currentStop);
    loadStop(currentStop);
}

function startAutoRefresh() {
    if (refreshTimer) clearInterval(refreshTimer);
    if (countdownTimer) clearInterval(countdownTimer);
    refreshTimer = setInterval(() => {
        if (currentStop) {
            const body = document.getElementById('stopBody');
            if (body) loadStop(currentStop);
        }
    }, REFRESH_SEC * 1000);
    countdownTimer = setInterval(() => {
        countdown--;
        if (countdown < 0) countdown = REFRESH_SEC;
        document.getElementById('timerText').textContent = 'רענון בעוד ' + countdown + ' שניות';
    }, 1000);
    countdown = REFRESH_SEC;
}

// Enter key on custom input
document.getElementById('customInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') searchCustom();
});

// ===== Boarding Wizard =====
let boardingWatchId = null;
let boardingWakeLock = null;

function closeBoarding() {
    const ov = document.querySelector('.boarding-overlay');
    if (ov) ov.remove();
    if (boardingWatchId) { navigator.geolocation.clearWatch(boardingWatchId); boardingWatchId = null; }
    if (boardingWakeLock) { boardingWakeLock.release().catch(()=>{}); boardingWakeLock = null; }
}

function boardingHTML(headerText, bodyHTML) {
    return `<div class="boarding-card">
        <div class="boarding-header">${headerText}</div>
        <div class="boarding-body">${bodyHTML}</div>
        <div class="boarding-close" onclick="closeBoarding()">ביטול ✕</div>
    </div>`;
}

function showBoardingOverlay(headerText, bodyHTML) {
    let ov = document.querySelector('.boarding-overlay');
    if (!ov) {
        ov = document.createElement('div');
        ov.className = 'boarding-overlay';
        ov.onclick = (e) => { if (e.target === ov) closeBoarding(); };
        document.body.appendChild(ov);
    }
    ov.innerHTML = boardingHTML(headerText, bodyHTML);
}

function getUserPosition() {
    return new Promise((resolve, reject) => {
        if (!navigator.geolocation) return reject('GPS לא זמין');
        navigator.geolocation.getCurrentPosition(
            pos => resolve({ lat: pos.coords.latitude, lon: pos.coords.longitude }),
            err => reject('לא ניתן לקבל מיקום GPS: ' + err.message),
            { enableHighAccuracy: true, timeout: 10000 }
        );
    });
}

function haversine(lat1, lon1, lat2, lon2) {
    const R = 6371000;
    const toRad = x => x * Math.PI / 180;
    const dLat = toRad(lat2 - lat1), dLon = toRad(lon2 - lon1);
    const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

async function startBoarding() {
    if (!currentStop || !currentStop.lat || !currentStop.lon) {
        alert('בחר תחנה קודם כדי להשתמש בתכונה זו');
        return;
    }
    showBoardingOverlay('🚌 עליתי לאוטובוס', `
        <div class="boarding-label">📍 תחנה: ${esc(currentStop.name)}</div>
        <div class="boarding-label">מה מספר הקו?</div>
        <input class="boarding-input" id="boardingLineInput" type="text" inputmode="numeric" placeholder="לדוגמה: 142" autofocus>
        <button class="boarding-btn boarding-btn-primary" onclick="boardingStep1()">המשך</button>
    `);
    setTimeout(() => document.getElementById('boardingLineInput')?.focus(), 300);
    document.getElementById('boardingLineInput')?.addEventListener('keydown', e => {
        if (e.key === 'Enter') boardingStep1();
    });
}

async function boardingStep1() {
    const lineNum = document.getElementById('boardingLineInput')?.value.trim();
    if (!lineNum) return;

    const userPos = { lat: currentStop.lat, lon: currentStop.lon };

    showBoardingOverlay('🚌 קו ' + lineNum, `
        <div class="boarding-spinner"></div>
        <div class="boarding-label" style="text-align:center">מחפש קו ${esc(lineNum)}...</div>
    `);

    let routes;
    try {
        const resp = await fetch(`${GTFS_API}/gtfs_routes/list?route_short_name=${encodeURIComponent(lineNum)}&date_from=2026-01-01&limit=30`);
        routes = await resp.json();
    } catch(e) {
        showBoardingOverlay('🚌 קו ' + lineNum, `
            <div class="boarding-info" style="color:red">⚠️ שגיאה בחיפוש קו</div>
        `);
        return;
    }

    if (!routes || routes.length === 0) {
        showBoardingOverlay('🚌 קו ' + lineNum, `
            <div class="boarding-info" style="color:red">⚠️ קו ${esc(lineNum)} לא נמצא</div>
        `);
        return;
    }

    // Group by operator — pick unique operator+direction pairs
    const operators = {};
    for (const r of routes) {
        const key = r.operator_ref + '_' + r.route_direction;
        if (!operators[key]) operators[key] = r;
    }
    const uniqueOps = {};
    for (const r of Object.values(operators)) {
        if (!uniqueOps[r.operator_ref]) uniqueOps[r.operator_ref] = [];
        uniqueOps[r.operator_ref].push(r);
    }
    const opKeys = Object.keys(uniqueOps);

    // If only one operator, skip operator selection
    if (opKeys.length === 1) {
        boardingSelectDirection(lineNum, uniqueOps[opKeys[0]], userPos);
    } else {
        // Find nearest operator by checking a stop from each
        // For speed, just show all options and let user pick, with GPS hint
        let btns = '';
        for (const opRef of opKeys) {
            const r = uniqueOps[opRef][0];
            const desc = r.route_long_name || '';
            const agency = r.agency_name || '';
            const city = desc.match(/-([^-<]+?)(?:<|$)/)?.[1]?.trim() || '';
            btns += `<button class="boarding-btn-op" onclick="boardingPickOperator('${esc(lineNum)}',${opRef},${JSON.stringify(userPos).replace(/"/g,'&quot;')})">
                🏢 ${esc(agency)} ${city ? '(' + esc(city) + ')' : ''}<br>
                <small style="color:#666">${esc(desc.split('<->').join(' ↔ ').replace(/-\d.*$/,''))}</small>
            </button>`;
        }
        showBoardingOverlay('🚌 קו ' + lineNum, `
            <div class="boarding-label">נמצאו מספר מפעילים לקו ${esc(lineNum)}:</div>
            ${btns}
        `);

        // Store data for next step
        window._boardingRoutes = uniqueOps;
    }
}

function boardingPickOperator(lineNum, opRef, userPos) {
    const dirs = window._boardingRoutes[opRef];
    boardingSelectDirection(lineNum, dirs, userPos);
}

function boardingSelectDirection(lineNum, dirs, userPos) {
    // dirs is array of routes for one operator, different directions
    // Extract direction endpoints from route_long_name: "A-city<->B-city-dir"
    let btns = '';
    for (const r of dirs) {
        const desc = r.route_long_name || '';
        const parts = desc.split('<->');
        const from = parts[0]?.replace(/-[^-]+$/, '').trim() || '';
        const to = parts[1]?.replace(/-[^-]*-\d.*$/, '').replace(/-[^-]+$/, '').trim() || '';
        const label = `${from} ← ${to}`;
        btns += `<button class="boarding-btn-dir" onclick="boardingPickDirection(${r.id},'${esc(lineNum)}',${JSON.stringify(userPos).replace(/"/g,'&quot;')})">
            🚌 לכיוון: ${esc(to || from)}<br>
            <small style="color:#7b1fa2;font-size:12px">${esc(label)}</small>
        </button>`;
    }
    showBoardingOverlay('🚌 קו ' + lineNum + ' — כיוון', `
        <div class="boarding-label">לאן אתה נוסע?</div>
        ${btns}
    `);
}

async function boardingPickDirection(routeId, lineNum, userPos) {
    showBoardingOverlay('🚌 קו ' + lineNum, `
        <div class="boarding-spinner"></div>
        <div class="boarding-label" style="text-align:center">טוען תחנות...</div>
    `);

    try {
        // Get a ride for this route
        const ridesResp = await fetch(`${GTFS_API}/gtfs_rides/list?gtfs_route_id=${routeId}&limit=1&order_by=start_time%20desc`);
        const rides = await ridesResp.json();
        if (!rides || rides.length === 0) throw new Error('לא נמצאו נסיעות');

        // Get stops for this ride
        const stopsResp = await fetch(`${GTFS_API}/gtfs_ride_stops/list?gtfs_ride_ids=${rides[0].id}&limit=100&order_by=stop_sequence`);
        const stops = await stopsResp.json();
        if (!stops || stops.length === 0) throw new Error('לא נמצאו תחנות');

        // Find nearest stop to user
        let nearestIdx = 0, nearestDist = Infinity;
        for (let i = 0; i < stops.length; i++) {
            const d = haversine(userPos.lat, userPos.lon, stops[i].gtfs_stop__lat, stops[i].gtfs_stop__lon);
            if (d < nearestDist) { nearestDist = d; nearestIdx = i; }
        }

        // Show stops from nearest onwards (remaining stops)
        const remaining = stops.slice(nearestIdx + 1);
        if (remaining.length === 0) {
            showBoardingOverlay('🚌 קו ' + lineNum, `
                <div class="boarding-info" style="color:red">⚠️ אתה בתחנה האחרונה של הקו</div>
            `);
            return;
        }

        const boardingStop = stops[nearestIdx];
        let stopsHTML = '';
        for (let i = 0; i < remaining.length; i++) {
            const s = remaining[i];
            const stopsLeft = i + 1;
            stopsHTML += `<div class="boarding-stop-item" onclick="boardingSelectDest(${i},'${esc(lineNum)}')">
                <span>${esc(s.gtfs_stop__name)}</span>
                <span class="boarding-stop-city">${esc(s.gtfs_stop__city || '')} · ${stopsLeft} תחנות</span>
            </div>`;
        }

        showBoardingOverlay('🚌 קו ' + lineNum + ' — איפה יורדים?', `
            <div class="boarding-label">📍 עלית ב: ${esc(boardingStop.gtfs_stop__name)}</div>
            <div class="boarding-label" style="margin-top:8px">בחר תחנת יעד:</div>
            <div class="boarding-stops">${stopsHTML}</div>
        `);

        // Store remaining stops for destination selection
        window._boardingRemaining = remaining;
        window._boardingLineNum = lineNum;
        window._boardingStartStop = boardingStop;

    } catch(e) {
        showBoardingOverlay('🚌 קו ' + lineNum, `
            <div class="boarding-info" style="color:red">⚠️ ${e.message || e}</div>
        `);
    }
}

function boardingSelectDest(idx, lineNum) {
    const dest = window._boardingRemaining[idx];
    const start = window._boardingStartStop;
    const stopsCount = idx + 1;
    const distKm = (haversine(start.gtfs_stop__lat, start.gtfs_stop__lon, dest.gtfs_stop__lat, dest.gtfs_stop__lon) / 1000).toFixed(1);

    // Estimate time from scheduled arrival times
    let estMin = '';
    if (start.arrival_time && dest.arrival_time) {
        const t1 = new Date(start.arrival_time).getTime();
        const t2 = new Date(dest.arrival_time).getTime();
        if (t2 > t1) estMin = Math.round((t2 - t1) / 60000);
    }

    showBoardingOverlay('🚌 קו ' + lineNum + ' — יעד', `
        <div style="text-align:center">
            <div class="boarding-label">📍 מ: ${esc(start.gtfs_stop__name)}</div>
            <div class="alert-dest-name">🏁 אל: ${esc(dest.gtfs_stop__name)}</div>
            <div style="font-size:14px;color:#555;margin:8px 0">
                📏 ${distKm} ק"מ · 🚏 ${stopsCount} תחנות
                ${estMin ? ' · ⏱️ ~' + estMin + ' דקות' : ''}
            </div>
        </div>
        <button class="boarding-btn boarding-btn-primary" style="margin-top:14px;font-size:16px" onclick="boardingStartAlert()">
            🔔 כן! תתריע 100 מטר לפני היעד
        </button>
        <button class="boarding-btn" style="background:#eee;color:#555;margin-top:6px" onclick="closeBoarding()">
            לא תודה
        </button>
        <div class="boarding-info" style="margin-top:10px">⚠️ אין לסגור מסך זה כל עוד נדרשת התראה לפני הגעה ליעד</div>
    `);

    window._boardingDest = dest;
}

async function boardingStartAlert() {
    const dest = window._boardingDest;
    const lineNum = window._boardingLineNum;
    if (!dest) return;

    // Request notification permission
    if ('Notification' in window && Notification.permission === 'default') {
        await Notification.requestPermission();
    }

    // Try to keep screen on
    try {
        if ('wakeLock' in navigator) {
            boardingWakeLock = await navigator.wakeLock.request('screen');
        }
    } catch(e) {}

    showBoardingOverlay('🔔 מעקב — קו ' + lineNum, `
        <div class="alert-active-screen">
            <div class="alert-status">🎯 יעד:</div>
            <div class="alert-dest-name">${esc(dest.gtfs_stop__name)}</div>
            <div class="alert-distance" id="boardingDistText">מחשב...</div>
            <div class="alert-status" id="boardingAlertStatus">📡 מעקב GPS פעיל</div>
            <div id="boardingArrived"></div>
        </div>
        <div class="boarding-info">⚠️ אין לסגור מסך זה כל עוד נדרשת התראה</div>
    `);

    // Start GPS watch
    boardingWatchId = navigator.geolocation.watchPosition(
        (pos) => {
            const dist = haversine(pos.coords.latitude, pos.coords.longitude, dest.gtfs_stop__lat, dest.gtfs_stop__lon);
            const distText = dist >= 1000 ? (dist/1000).toFixed(1) + ' ק"מ' : Math.round(dist) + ' מטר';
            const el = document.getElementById('boardingDistText');
            if (el) el.textContent = distText;

            const statusEl = document.getElementById('boardingAlertStatus');
            if (dist <= 100) {
                // ARRIVED!
                if (statusEl) statusEl.textContent = '🎉 הגעת!';
                const arrEl = document.getElementById('boardingArrived');
                if (arrEl && !arrEl.innerHTML) {
                    arrEl.innerHTML = `<div class="alert-arrived">🎉 הגעת ליעד! ירד בתחנה הבאה!</div>`;
                    // Vibrate
                    if (navigator.vibrate) navigator.vibrate([500, 200, 500, 200, 500]);
                    // Notification
                    if ('Notification' in window && Notification.permission === 'granted') {
                        new Notification('🚌 הגעת ליעד!', { body: dest.gtfs_stop__name + ' — ירד בתחנה הבאה!', icon: '🚌' });
                    }
                }
            } else if (dist <= 300) {
                if (statusEl) statusEl.textContent = '⚡ מתקרב ליעד!';
            } else {
                if (statusEl) statusEl.textContent = '📡 מעקב GPS פעיל';
            }
        },
        (err) => {
            const statusEl = document.getElementById('boardingAlertStatus');
            if (statusEl) statusEl.textContent = '⚠️ שגיאת GPS: ' + err.message;
        },
        { enableHighAccuracy: true, maximumAge: 5000, timeout: 15000 }
    );
}
