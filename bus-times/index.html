<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>זמני אוטובוס</title>
    <meta name="theme-color" content="#1a73e8">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚌</text></svg>">
    <style>
        :root {
            --primary: #1a73e8;
            --primary-dark: #1557b0;
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --text: #1a1a2e;
            --text-muted: #6b7280;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            --green-bg: #c8f7c5;
            --green-header: #2e7d32;
            --green-btn: #43a047;
            --red-bg: #fdd;
            --red-header: #c62828;
            --red-btn: #e53935;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
            --radius: 14px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        .header {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            padding: 14px 16px 10px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 12px rgba(26,115,232,0.3);
        }
        .header h1 { font-size: 20px; font-weight: 700; margin-bottom: 3px; }
        .header-sub {
            font-size: 11px;
            opacity: 0.85;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .header-sub .dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            display: inline-block;
        }
        .dot-ok { background: var(--success); animation: pulse 2s infinite; }
        .dot-err { background: var(--danger); }
        .dot-load { background: var(--warning); animation: pulse 0.8s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

        /* Stop selector buttons */
        .stop-buttons {
            background: white;
            padding: 10px 10px 8px;
            border-bottom: 1px solid #e5e7eb;
        }
        .btn-section-label {
            font-size: 11px;
            font-weight: 700;
            margin-bottom: 5px;
            padding-right: 4px;
        }
        .btn-section-label.lbl-base { color: var(--green-header); }
        .btn-section-label.lbl-home { color: var(--red-header); }
        .btn-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-bottom: 8px;
        }
        .stop-btn {
            border: none;
            border-radius: 8px;
            padding: 5px 6px;
            font-size: 9.5px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            color: white;
            flex: 1;
            min-width: 0;
            white-space: normal;
            line-height: 1.25;
            max-height: 48px;
            overflow: hidden;
            text-align: center;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .stop-btn:active { transform: scale(0.96); }
        .stop-btn.btn-base { background: var(--green-btn); }
        .stop-btn.btn-home { background: var(--red-btn); }
        .stop-btn.active { box-shadow: 0 0 0 3px rgba(0,0,0,0.3); transform: scale(1.03); }

        /* Custom stop search */
        .custom-search {
            display: flex;
            gap: 6px;
            margin-top: 2px;
            align-items: center;
        }
        .custom-search input {
            flex: 1;
            padding: 7px 10px;
            border: 1.5px solid #d1d5db;
            border-radius: 8px;
            font-size: 13px;
            font-family: inherit;
        }
        .custom-search input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 2px rgba(26,115,232,0.2); }
        .custom-search button {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 7px 14px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            white-space: nowrap;
        }

        /* Toolbar */
        .toolbar {
            background: #fafafa;
            padding: 6px 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border-bottom: 1px solid #e5e7eb;
        }
        .toolbar button {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 5px 12px;
            font-size: 12px;
            cursor: pointer;
            font-family: inherit;
        }
        .toolbar .timer { font-size: 11px; color: var(--text-muted); }

        /* Single stop card */
        .stop-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            max-width: 600px;
            margin: 12px auto;
        }
        .stop-card.dir-base { border-right: 5px solid var(--green-header); }
        .stop-card.dir-home { border-right: 5px solid var(--red-header); }
        .stop-card.dir-custom { border-right: 5px solid var(--primary); }

        .stop-header {
            padding: 12px 14px 8px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .stop-header-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .stop-official-name {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 500;
        }
        .stop-header.bg-green { background: var(--green-bg); }
        .stop-header.bg-red { background: var(--red-bg); }
        .stop-header.bg-blue { background: #e3f2fd; }

        .stop-name { font-size: 16px; font-weight: 700; }
        .stop-code {
            font-size: 12px;
            color: var(--text-muted);
            background: rgba(255,255,255,0.7);
            padding: 2px 8px;
            border-radius: 10px;
            font-family: monospace;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .copy-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 13px;
            padding: 0 2px;
            opacity: 0.6;
            transition: opacity 0.2s;
        }
        .copy-btn:hover { opacity: 1; }
        .copy-btn.copied { opacity: 1; }
        .loc-btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: rgba(255,255,255,0.85);
            border: 1px solid #ddd;
            border-radius: 16px;
            padding: 3px 10px;
            font-size: 12px;
            color: #1a73e8;
            cursor: pointer;
            margin: 4px 14px 0;
            text-decoration: none;
            transition: background 0.2s;
        }
        .loc-btn:hover { background: #e8f0fe; }
        .stop-desc {
            font-size: 13px;
            color: var(--text-muted);
            padding: 4px 14px 8px;
            border-bottom: 1px solid #f3f4f6;
        }
        .stop-img {
            width: 100%;
            height: 140px;
            object-fit: cover;
            display: block;
        }
        .stop-img.img-bottom { object-position: center bottom; }
        .stop-img.img-75 { object-position: center 85%; }
        .stop-img-placeholder {
            width: 100%;
            height: 70px;
            background: #f3f4f6;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #aaa;
        }
        .stop-body { padding: 8px 14px 14px; }

        /* Bus rows */
        .bus-row {
            display: flex;
            align-items: center;
            padding: 8px 6px;
            margin-bottom: 3px;
            border-radius: 8px;
            background: #fafafa;
        }
        .bus-row.relevant {
            background: repeating-linear-gradient(
                -45deg,
                #fff8e1,
                #fff8e1 6px,
                #fff3cd 6px,
                #fff3cd 12px
            );
            border: 2px solid #ff8f00;
            border-radius: 10px;
            padding: 8px 6px;
        }

        .bus-line {
            background: var(--primary);
            color: white;
            font-weight: 700;
            font-size: 14px;
            min-width: 48px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: 10px;
            flex-shrink: 0;
        }
        .bus-line.highlight {
            background: #e65100;
            font-size: 17px;
            min-width: 56px;
            height: 36px;
            box-shadow: 0 2px 8px rgba(230,81,0,0.4);
        }

        .bus-dest {
            flex: 1;
            font-size: 13px;
            overflow: hidden;
        }
        .bus-dest.bold { font-weight: 800; font-size: 14px; color: #e65100; }
        .bus-stops-away {
            font-size: 12px; font-weight: 800; color: #d84315;
            background: #fbe9e7; border-radius: 8px; padding: 2px 8px;
            display: inline-block; margin-top: 1px;
            border: 1px solid #ffccbc;
        }
        .line-filters {
            display: flex; flex-wrap: wrap; gap: 6px; padding: 8px 4px;
            border-bottom: 1px solid #e0e0e0; margin-bottom: 4px;
        }
        .line-filter-btn {
            font-size: 13px; font-weight: 700; padding: 4px 14px;
            border-radius: 16px; border: 2px solid #1565c0;
            background: #fff; color: #1565c0; cursor: pointer;
            transition: all 0.2s;
        }
        .line-filter-btn.active {
            background: #1565c0; color: #fff;
        }
        .line-filter-btn:hover { opacity: 0.85; }

        .bus-info {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 1px;
            flex-shrink: 0;
            min-width: 80px;
        }
        .bus-eta {
            font-size: 15px;
            font-weight: 700;
            text-align: center;
        }
        .bus-meta {
            font-size: 10px;
            color: #999;
            text-align: center;
            white-space: nowrap;
        }
        .eta-now { color: #fff; background: #22c55e; border-radius: 8px; padding: 2px 8px; animation: pulse 1s infinite; }
        .eta-gps { color: #22c55e; font-weight: 800; }
        .eta-soon { color: var(--warning); font-size: 16px; }
        .eta-normal { color: var(--text); }
        .eta-legend {
            display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
            padding: 8px 14px; font-size: 11px; color: #666;
        }
        .eta-legend span { display: inline-flex; align-items: center; gap: 3px; }
        .legend-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
        .legend-green { background: #22c55e; }
        .legend-orange { background: #f59e0b; }
        .legend-black { background: #1a1a2e; }

        .no-data {
            text-align: center;
            padding: 20px 0;
            color: var(--text-muted);
            font-size: 14px;
        }
        .stop-loading {
            text-align: center;
            padding: 20px 0;
            color: var(--text-muted);
            font-size: 13px;
        }
        .spinner {
            width: 24px; height: 24px;
            border: 2.5px solid #e5e7eb;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .stop-error {
            text-align: center;
            padding: 14px 0;
            color: var(--danger);
            font-size: 13px;
        }

        .footer {
            text-align: center;
            padding: 16px;
            font-size: 11px;
            color: var(--text-muted);
        }

        /* Line detail modal */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5); z-index: 1000;
            display: flex; align-items: center; justify-content: center;
            padding: 16px;
        }
        .modal-card {
            background: #fff; border-radius: 16px; width: 100%; max-width: 380px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.3); overflow: hidden;
            animation: slideUp 0.25s ease;
        }
        @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .modal-header {
            display: flex; align-items: center; gap: 12px;
            padding: 16px; background: var(--primary); color: #fff;
        }
        .modal-line-num {
            font-size: 28px; font-weight: 800;
            background: rgba(255,255,255,0.2); border-radius: 10px;
            min-width: 60px; height: 44px;
            display: flex; align-items: center; justify-content: center;
        }
        .modal-dest { font-size: 15px; font-weight: 600; flex: 1; }
        .modal-operator { font-size: 11px; opacity: 0.8; margin-top: 2px; }
        .modal-body { padding: 14px 16px; }
        .modal-times { display: flex; flex-wrap: wrap; gap: 8px; margin: 8px 0 14px; }
        .modal-time-chip {
            background: #f0fdf4; color: #22c55e; font-weight: 700;
            padding: 6px 14px; border-radius: 20px; font-size: 14px;
            border: 1px solid #bbf7d0;
        }
        .modal-time-chip:first-child { background: #22c55e; color: #fff; border-color: #22c55e; }
        .modal-section { font-size: 12px; color: #888; margin-bottom: 4px; font-weight: 600; }
        .modal-btns { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
        .modal-nav-btn {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            width: 100%; padding: 12px; border: none; border-radius: 12px;
            background: #7b1fa2; color: #fff; font-size: 15px; font-weight: 700;
            cursor: pointer; text-decoration: none;
        }
        .modal-nav-btn:hover { background: #6a1b9a; }
        .modal-nav-btn.secondary {
            background: #1a73e8; font-size: 13px; padding: 10px;
        }
        .modal-nav-btn.secondary:hover { background: #1557b0; }
        .modal-close {
            display: block; text-align: center; padding: 12px;
            color: #888; font-size: 13px; cursor: pointer;
            border-top: 1px solid #f3f4f6;
        }
        .modal-close:hover { background: #f9fafb; }

        /* Boarding wizard */
        .boarding-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6); z-index: 2000;
            display: flex; align-items: center; justify-content: center;
            padding: 16px;
        }
        .boarding-card {
            background: #fff; border-radius: 16px; width: 100%; max-width: 380px;
            max-height: 90vh; overflow-y: auto;
            box-shadow: 0 12px 40px rgba(0,0,0,0.3); animation: slideUp 0.25s ease;
        }
        .boarding-header {
            background: #e65100; color: #fff; padding: 16px; text-align: center;
            border-radius: 16px 16px 0 0; font-weight: 800; font-size: 18px;
        }
        .boarding-body { padding: 16px; direction: rtl; }
        .boarding-label { font-size: 14px; color: #555; margin-bottom: 8px; font-weight: 600; }
        .boarding-input {
            width: 100%; padding: 12px; border: 2px solid #e5e7eb; border-radius: 12px;
            font-size: 18px; text-align: center; font-weight: 700; direction: ltr;
        }
        .boarding-input:focus { border-color: #e65100; outline: none; }
        .boarding-btn {
            width: 100%; padding: 12px; border: none; border-radius: 12px;
            font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 8px;
        }
        .boarding-btn-primary { background: #e65100; color: #fff; }
        .boarding-btn-primary:hover { background: #bf360c; }
        .boarding-btn-dir {
            background: #f3e5f5; color: #7b1fa2; border: 2px solid #ce93d8;
            text-align: right; padding: 14px; margin-top: 8px; border-radius: 12px;
            cursor: pointer; font-size: 15px; font-weight: 700; width: 100%;
        }
        .boarding-btn-dir:hover { background: #e1bee7; }
        .boarding-btn-op {
            background: #e3f2fd; color: #1565c0; border: 2px solid #90caf9;
            text-align: right; padding: 12px; margin-top: 6px; font-size: 13px;
            border-radius: 12px; cursor: pointer; font-weight: 700; width: 100%;
        }
        .boarding-btn-op:hover { background: #bbdefb; }
        .boarding-stops {
            max-height: 280px; overflow-y: auto; margin-top: 8px;
            border: 1px solid #e5e7eb; border-radius: 10px;
        }
        .boarding-stop-item {
            padding: 10px 14px; border-bottom: 1px solid #f3f4f6;
            cursor: pointer; font-size: 13px; display: flex; justify-content: space-between; align-items: center;
        }
        .boarding-stop-item:hover { background: #fff3e0; }
        .boarding-stop-item:last-child { border-bottom: none; }
        .boarding-stop-item:nth-child(odd) { background: #fafafa; }
        .boarding-stop-item:nth-child(odd):hover { background: #fff3e0; }
        .boarding-stop-city { color: #888; font-size: 11px; }
        .boarding-close {
            display: block; text-align: center; padding: 12px;
            color: #888; font-size: 13px; cursor: pointer;
            border-top: 1px solid #f3f4f6; border-radius: 0 0 16px 16px;
        }
        .boarding-close:hover { background: #f9fafb; }
        .boarding-info { background: #fff3e0; border-radius: 10px; padding: 12px; margin-top: 10px; font-size: 12px; color: #e65100; text-align: center; }
        .boarding-spinner { width: 24px; height: 24px; border: 3px solid #e5e7eb; border-top-color: #e65100; border-radius: 50%; animation: spin 0.7s linear infinite; margin: 16px auto; }
        .alert-active-screen { text-align: center; padding: 20px 0; }
        .alert-dest-name { font-size: 18px; font-weight: 800; color: #e65100; margin: 10px 0; }
        .alert-distance { font-size: 32px; font-weight: 900; color: #1a73e8; margin: 10px 0; }
        .alert-status { font-size: 14px; color: #888; }
        .alert-arrived { background: #d32f2f; color: #fff; padding: 20px; border-radius: 12px; font-size: 20px; font-weight: 800; margin-top: 16px; animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        /* Floating monitor bar */
        .monitor-bar {
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 1500;
            background: linear-gradient(135deg, #1a237e, #283593);
            color: #fff; padding: 10px 16px; cursor: pointer;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.3);
            transition: transform 0.3s ease;
            direction: rtl;
        }
        .monitor-bar-top { display: flex; align-items: center; justify-content: space-between; }
        .monitor-bar-line { font-size: 20px; font-weight: 900; }
        .monitor-bar-dest { font-size: 13px; opacity: 0.85; margin-top: 2px; }
        .monitor-bar-stats { display: flex; gap: 16px; align-items: center; }
        .monitor-bar-stat { text-align: center; }
        .monitor-bar-num { font-size: 22px; font-weight: 900; }
        .monitor-bar-num.urgent { color: #ff5252; animation: pulse 1s infinite; }
        .monitor-bar-lbl { font-size: 9px; opacity: 0.7; }
        .monitor-bar-progress { height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; margin-top: 8px; overflow: hidden; }
        .monitor-bar-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, #4caf50, #ff9800, #f44336); transition: width 1s ease; }
        .monitor-bar-expand { text-align: center; font-size: 10px; opacity: 0.5; margin-top: 4px; }
        .monitor-bar .close-x { position: absolute; top: 6px; left: 10px; font-size: 18px; opacity: 0.5; cursor: pointer; }
        .monitor-bar .close-x:hover { opacity: 1; }
        /* Expanded track panel */
        .monitor-panel {
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 1600;
            background: #fff; border-radius: 20px 20px 0 0;
            box-shadow: 0 -8px 30px rgba(0,0,0,0.25);
            max-height: 85vh; overflow-y: auto;
            transform: translateY(100%); transition: transform 0.35s ease;
            direction: rtl;
        }
        .monitor-panel.open { transform: translateY(0); }
        .monitor-panel-header {
            position: sticky; top: 0; background: #fff; z-index: 2;
            padding: 12px 16px; border-bottom: 1px solid #f0f0f0;
            display: flex; justify-content: space-between; align-items: center;
            border-radius: 20px 20px 0 0;
        }
        .monitor-panel-handle { width: 40px; height: 4px; background: #ddd; border-radius: 2px; margin: 0 auto 8px; }
        .monitor-panel-close { font-size: 14px; color: #888; cursor: pointer; padding: 4px 10px; }
        /* Route track — Monopoly style */
        .track-container { position: relative; padding: 8px 0 8px 44px; }
        .track-rail { position: absolute; left: 18px; top: 0; bottom: 0; width: 6px; background: #e0e0e0; border-radius: 3px; }
        .track-rail-fill { position: absolute; left: 18px; top: 0; width: 6px; border-radius: 3px; background: linear-gradient(to bottom, #4caf50, #ff9800, #f44336); transition: height 0.8s ease; }
        .track-stop { position: relative; padding: 6px 8px 6px 12px; display: flex; align-items: center; gap: 8px; min-height: 34px; transition: all 0.4s; }
        .track-dot { position: absolute; left: -32px; width: 18px; height: 18px; border-radius: 50%; border: 3px solid #bdbdbd; background: #fff; z-index: 2; display: flex; align-items: center; justify-content: center; font-size: 9px; transition: all 0.4s; }
        .track-stop.passed .track-dot { background: #4caf50; border-color: #388e3c; color: #fff; }
        .track-stop.current .track-dot { background: #fff; border-color: #1565c0; box-shadow: 0 0 12px rgba(21,101,192,0.6); animation: dotPulse 1.5s infinite; }
        .track-stop.alert-stop .track-dot { background: #fff3e0; border-color: #ff9800; }
        .track-stop.dest .track-dot { background: #f44336; border-color: #c62828; width: 22px; height: 22px; left: -34px; font-size: 11px; }
        .track-name { font-size: 12px; color: #666; flex: 1; direction: rtl; }
        .track-stop.passed .track-name { color: #bbb; text-decoration: line-through; font-size: 11px; }
        .track-stop.current .track-name { color: #1565c0; font-weight: 800; font-size: 14px; }
        .track-stop.dest .track-name { color: #d32f2f; font-weight: 800; font-size: 14px; }
        .track-stop.alert-stop .track-name { color: #e65100; font-weight: 700; }

const MOT_API = 'https://bus.gov.il/WebApi/api/passengerinfo';
const GTFS_API = 'https://open-bus-stride-api.hasadna.org.il';

let currentStop = null; // currently selected stop object
let isCustom = false;
let lastMotLines = []; // store raw MOT data for modal
let activeLineFilter = null; // currently filtered line number

let lastArrivalSource = ''; // store last source for re-render

// ===== Helpers =====
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function copyCode(code, btn) {
    navigator.clipboard.writeText(code).then(() => {
        const orig = btn.textContent;
        btn.textContent = '✓';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 1500);
    });
}

async function fetchAndOpenMap(code) {
    try {
        const resp = await fetch(`${GTFS_API}/gtfs_stops/list?code=${code}&limit=1`);
        const raw = await resp.json();
        const stops = raw.value || raw;
        if (stops.length > 0 && stops[0].lat && stops[0].lon) {
            window.open(`https://www.google.com/maps?q=${stops[0].lat},${stops[0].lon}`, '_blank');
        } else {
            window.open(`https://www.google.com/maps/search/bus+stop+${code}+israel`, '_blank');
        }
    } catch(e) {
        window.open(`https://www.google.com/maps/search/bus+stop+${code}+israel`, '_blank');
    }
}

function toISOLocal(d) {
    const off = d.getTimezoneOffset();
    const sign = off <= 0 ? '+' : '-';
    const h = String(Math.floor(Math.abs(off)/60)).padStart(2,'0');
    const m = String(Math.abs(off)%60).padStart(2,'0');
    const iso = new Date(d.getTime() - off*60000).toISOString().replace('Z','');
    return iso + sign + h + ':' + m;
}


// ===== Build buttons =====
function buildButtons() {
    const baseGrid = document.getElementById('baseButtons');
    const homeGrid = document.getElementById('homeButtons');
    STOPS.forEach((s, i) => {
        const btn = document.createElement('button');
        btn.className = 'stop-btn ' + (s.dir === 'base' ? 'btn-base' : 'btn-home');
        btn.textContent = s.name;
        btn.title = s.code + ' — ' + s.desc;
        btn.dataset.idx = i;
        btn.onclick = () => selectStop(i);
        if (s.dir === 'base') baseGrid.appendChild(btn);
        else homeGrid.appendChild(btn);
    });
}

function highlightBtn(idx) {
    document.querySelectorAll('.stop-btn').forEach(b => b.classList.remove('active'));
    if (idx !== null) {
        const btn = document.querySelector(`.stop-btn[data-idx="${idx}"]`);
        if (btn) btn.classList.add('active');
    }
}

// ===== Select stop =====
function selectStop(idx) {
    isCustom = false;
    activeLineFilter = null;
    currentStop = { ...STOPS[idx], _idx: idx };
    highlightBtn(idx);
    renderCard(currentStop);

}

function selectCustomStop(code, name) {
    isCustom = true;
    activeLineFilter = null;
    currentStop = { code, name: name || 'תחנה ' + code, desc: '', lines: [], dir: 'custom', img: '' };

    renderCard(currentStop);

}

// ===== Render single card =====
function renderCard(stop) {

    else { bgClass = 'bg-blue'; dirClass = 'dir-custom'; }

            </div>

        </div>
        ${stop.lat ? `<a class="loc-btn" href="https://www.google.com/maps?q=${stop.lat},${stop.lon}" target="_blank" rel="noopener">📍 מיקום במפה</a>` : `<a class="loc-btn" id="locBtn" href="#" onclick="fetchAndOpenMap('${esc(stop.code)}');return false;">📍 מיקום במפה</a>`}
        ${descHtml}
        ${imgHtml}

}

// ===== Fetch: bus.gov.il (real-time MOT), fallback to GTFS =====
async function loadStop(stop) {
    const body = document.getElementById('stopBody');
    if (!body) return;

    document.getElementById('statusDot').className = 'dot dot-load';
    document.getElementById('statusText').textContent = 'מעדכן...';

    const now = new Date();
    let source = '';

    try {
        // Primary: bus.gov.il real-time SIRI (MOT official)
        const motUrl = `${MOT_API}/GetRealtimeBusLineListByBustop/${stop.code}/he/false?_t=${Date.now()}`;
        const proxies = [
            PROXY,
            'https://api.allorigins.win/raw?url=',
            'https://api.codetabs.com/v1/proxy?quest='
        ];
        let raw = null;
        for (const px of proxies) {
            try {
                const ctrl = new AbortController();
                const tid = setTimeout(() => ctrl.abort(), 8000);
                const resp = await fetch(px + encodeURIComponent(motUrl), { signal: ctrl.signal, cache: 'no-store', headers: {'Cache-Control':'no-cache','Pragma':'no-cache'} });
                clearTimeout(tid);
                if (!resp.ok) continue;
                raw = await resp.json();
                if (raw && (Array.isArray(raw) || raw.value)) break;
                raw = null;
            } catch(_) { continue; }
        }
        if (!raw) throw new Error('MOT: all proxies failed');
        // API returns {value:[...], Count:N} or plain array
        const lines = Array.isArray(raw) ? raw : (raw.value || []);

        // Update stop name for custom stops
        if (lines.length > 0 && lines[0].BusstopHebrewName) {
            const officialEl = document.getElementById('stopOfficialName');
            if (officialEl) officialEl.textContent = '🚏 ' + lines[0].BusstopHebrewName;
            if (isCustom) {
                currentStop.name = lines[0].BusstopHebrewName;
                const nameEl = document.querySelector('.stop-name');
                if (nameEl) nameEl.textContent = lines[0].BusstopHebrewName;
            }
        }

        lastMotLines = lines;
        const arrivals = parseMotData(lines, stop.lines || []);
        renderArrivals(body, arrivals, 'realtime');
        source = 'realtime';

    } catch(e1) {
        // Fallback to GTFS planned schedule
        try {
            const later = new Date(now.getTime() + 90 * 60000);
            const from = toISOLocal(now);
            const to = toISOLocal(later);
            const today = now.toISOString().split('T')[0];

            const url = `${GTFS_API}/gtfs_ride_stops/list?` +
                `gtfs_stop__code=${stop.code}` +
                `&gtfs_stop__date_from=${today}&gtfs_stop__date_to=${today}` +
                `&arrival_time_from=${encodeURIComponent(from)}` +
                `&arrival_time_to=${encodeURIComponent(to)}` +
                `&limit=25` +
                `&order_by=arrival_time asc`;

            const resp2 = await fetch(url + '&_t=' + Date.now(), { cache: 'no-store' });
            if (!resp2.ok) throw new Error('HTTP ' + resp2.status);
            const data = await resp2.json();

            if (data.length > 0 && data[0].gtfs_stop__name) {
                const officialEl = document.getElementById('stopOfficialName');
                if (officialEl) officialEl.textContent = '🚏 ' + data[0].gtfs_stop__name;
                if (isCustom) {
                    currentStop.name = data[0].gtfs_stop__name;
                    const nameEl = document.querySelector('.stop-name');
                    if (nameEl) nameEl.textContent = data[0].gtfs_stop__name;
                }
            }

            const arrivals = parseGtfsData(data, now, stop.lines || []);
            renderArrivals(body, arrivals, 'planned');
            source = 'planned';

        } catch(e2) {
            body.innerHTML = `<div class="stop-error">⚠️ שגיאה: ${esc(e2.message)}</div>`;
            document.getElementById('statusDot').className = 'dot dot-err';
            document.getElementById('statusText').textContent = 'שגיאה';
            countdown = REFRESH_SEC;
            return;
        }
    }

    const ts = now.toLocaleTimeString('he-IL', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
    document.getElementById('lastRefresh').textContent = ts;
    document.getElementById('statusDot').className = 'dot dot-ok';
    document.getElementById('statusText').textContent = source === 'realtime'
        ? '🛰️ זמן אמת — משרד התחבורה'
        : '📋 לוח זמנים מתוכנן';
    countdown = REFRESH_SEC;
}

// Parse bus.gov.il real-time MOT data
function parseMotData(lines, relevantLines) {
    // Expand MinutesToArrivalList: each line can have multiple upcoming arrivals
    const expanded = [];
    (lines || []).forEach(ln => {
        const lineNum = String(ln.Shilut || '?');
        const dest = ln.DestinationQuarterName || ln.Description || '';
        const company = ln.CompanyHebrewName || '';
        const isRealtime = ln.ResponseSuccesed === true;
        const arrList = ln.MinutesToArrivalList || (ln.MinutesToArrival != null ? [ln.MinutesToArrival] : []);
        arrList.forEach((min, idx) => {
            // Estimate stops away: urban ~1.5 min/stop, intercity ~3 min/stop
            const isExpress = ln.TripsPerDay && ln.TripsPerDay < 20;
            const avgMinPerStop = isExpress ? 3 : 1.5;
            const stopsAway = min <= 0 ? 0 : Math.max(1, Math.round(min / avgMinPerStop));
            // Bus ID: MotLineId + direction + serial index
            const busId = `${ln.MotLineId || lineNum}-${ln.MotDirection || 0}-${idx+1}`;
            expanded.push({
                line: lineNum,
                dest,
                company,
                minutes: min,
                stopsAway,
                busId,
                busSerial: idx + 1,
                totalBuses: arrList.length,
                hasGps: isRealtime,
                isPlanned: false,
                isRelevant: relevantLines.length > 0 && relevantLines.includes(lineNum)
            });
        });
    });
    return expanded
        .filter(a => a.minutes >= -2)
        .sort((a,b) => {
            if (a.isRelevant && !b.isRelevant) return -1;
            if (!a.isRelevant && b.isRelevant) return 1;
            return a.minutes - b.minutes;
        })
        .slice(0, 15);
}

// Parse GTFS planned data (fallback)
function parseGtfsData(data, now, relevantLines) {
    const seen = new Set();
    return data.filter(d => {
        const key = (d.gtfs_route__route_short_name||'') + '_' + d.arrival_time;
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
    }).map(d => {
        const eta = d.arrival_time ? new Date(d.arrival_time) : null;
        const min = eta ? Math.round((eta - now) / 60000) : null;
        const lineNum = d.gtfs_route__route_short_name || '?';
        const dest = d.gtfs_route__route_long_name || '';
        return {
            line: lineNum,
            dest,
            company: d.gtfs_route__agency_name || '',
            minutes: min,
            hasGps: false,
            isPlanned: true,
            isRelevant: relevantLines.length > 0 && relevantLines.includes(lineNum)
        };
    }).filter(a => a.minutes !== null && a.minutes >= -2)
      .sort((a,b) => {
          if (a.isRelevant && !b.isRelevant) return -1;
          if (!a.isRelevant && b.isRelevant) return 1;
          return a.minutes - b.minutes;
      })
      .slice(0, 15);
}

// Unified render
function renderArrivals(body, arrivals, source) {
    lastArrivals = arrivals;
    lastArrivalSource = source;
    if (!arrivals || arrivals.length === 0) {
        // Check if it's Friday afternoon or Saturday — suggest "נעים בסופש"
        const now = new Date();
        const day = now.getDay(); // 5=Fri, 6=Sat
        const hour = now.getHours();
        const isWeekendTime = (day === 5 && hour >= 16) || (day === 6) || (day === 0 && hour < 2);
        const weekendNotice = isWeekendTime
            ? `<div style="margin-top:12px;padding:12px;background:#fff3e0;border-radius:10px;text-align:center;direction:rtl;font-size:13px">
                🚌 <b>קווי "נעים בסופ"ש"</b> (714, 718 ועוד) אינם מופיעים ב-bus.gov.il<br>
                <span style="font-size:11px;color:#555">שירות עירוני חינמי — שישי 16:30-02:00 | שבת 09:00-17:30</span><br>
                <a href="https://busofash.co.il" target="_blank" style="color:#e65100;font-weight:700;text-decoration:none">🔗 busofash.co.il — לוח זמנים ותחנות</a>
               </div>`
            : '';
        body.innerHTML = '<div class="no-data">אין אוטובוסים קרובים כרגע</div>' + weekendNotice;
        return;
    }

    // Build filter buttons from unique line numbers
    const uniqueLines = [...new Set(arrivals.map(a => a.line))];
    let filterHtml = '';
    if (uniqueLines.length > 1) {
        filterHtml = '<div class="line-filters">' +
            uniqueLines.map(ln => {
                const cls = (activeLineFilter === ln) ? 'line-filter-btn active' : 'line-filter-btn';
                return `<button class="${cls}" onclick="toggleLineFilter('${esc(ln)}')">${esc(ln)}</button>`;
            }).join('') + '</div>';
    }

    // Filter arrivals if a filter is active
    const filtered = activeLineFilter
        ? arrivals.filter(a => a.line === activeLineFilter)
        : arrivals;

    body.innerHTML = filterHtml + filtered.map(a => {
        let cls, txt;
        // Real-time (MOT confirmed) = green always
        if (a.hasGps && a.minutes <= 0) { cls = 'eta-now'; txt = 'מגיע!'; }
        else if (a.hasGps) { cls = 'eta-gps'; txt = a.minutes + " דק'"; }
        else if (a.minutes <= 1) { cls = 'eta-soon'; txt = '~עכשיו'; }
        else if (a.minutes <= 5) { cls = 'eta-soon'; txt = a.minutes + " דק'"; }
        else { cls = 'eta-normal'; txt = a.minutes + " דק'"; }

        let dest = a.dest;
        if (dest) {
            const parts = dest.split('-');
            if (parts.length >= 2) dest = parts[parts.length-1].trim();
            if (dest.length > 25) dest = dest.substring(0,25) + '...';
        }

        const badge = a.hasGps ? ' 🛰️' : (a.isPlanned ? ' 📋' : '');

        // Calculate ETA clock time
        const etaTime = new Date(Date.now() + a.minutes * 60000);
        const etaClock = etaTime.toLocaleTimeString('he-IL', { hour:'2-digit', minute:'2-digit' });

        // Stops away indicator
        let stopsTag = '';
        if (a.hasGps && a.stopsAway != null && a.minutes > 0) {
            const stLabel = a.stopsAway === 1 ? 'תחנה אחת לפניך' : a.stopsAway + ' תחנות לפניך';
            stopsTag = `<div class="bus-stops-away">🚏 ${stLabel}</div>`;
        }


        const rowClass = a.isRelevant ? 'bus-row relevant' : 'bus-row';
        const lineClass = a.isRelevant ? 'bus-line highlight' : 'bus-line';
        const destClass = a.isRelevant ? 'bus-dest bold' : 'bus-dest';

        return `
            <div class="${rowClass}" data-busid="${esc(a.busId || '')}">
                <div class="${lineClass}" style="cursor:pointer" onclick="showLineModal('${esc(a.line)}')">${esc(a.line)}</div>
                <div class="${destClass}">${esc(dest)}${stopsTag}</div>
                <div class="bus-info">
                    <div class="bus-eta ${cls}">${txt}${badge}</div>
                    <div class="bus-meta">${etaClock}</div>
                </div>
            </div>`;
    }).join('');

    // Legend
    const legendSrc = source === 'realtime'
        ? '<span>🛰️ = זמן אמת (משרד התחבורה)</span>'
        : '<span>📋 = לוח מתוכנן בלבד</span>';
    body.innerHTML += `<div class="eta-legend">

    }

}

function haversine(lat1, lon1, lat2, lon2) {
    const R = 6371000;
    const toRad = x => x * Math.PI / 180;
    const dLat = toRad(lat2 - lat1), dLon = toRad(lon2 - lon1);
    const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

// Step 1: Show lines from current arrivals
function startBoarding() {
    if (!currentStop) { alert('בחר תחנה קודם'); return; }
    if (!lastMotLines || lastMotLines.length === 0) { alert('אין נתוני אוטובוסים. רענן קודם.'); return; }

    // Get unique line numbers from current MOT data
    const uniqueLines = [];
    const seen = new Set();
    for (const ln of lastMotLines) {
        const key = ln.Shilut;
        if (!seen.has(key)) {
            seen.add(key);
            uniqueLines.push(ln);
        }
    }

    let btns = uniqueLines.map(ln => {
        const lineNum = String(ln.Shilut);
        const dest = ln.DestinationQuarterName || ln.Description || '';
        const company = ln.CompanyHebrewName || '';
        const min = ln.MinutesToArrival;
        const minTxt = min <= 0 ? 'מגיע!' : min + " דק'";
        return `<button class="boarding-btn-op" onclick="boardingPickLine('${esc(lineNum)}')">
            <b style="font-size:18px">קו ${esc(lineNum)}</b><br>
            <small>${esc(dest)} · ${esc(company)} · ${minTxt}</small>
        </button>`;
    }).join('');

    showBoardingOverlay('🚌 עליתי לאוטובוס', `
        <div class="boarding-label">📍 תחנה: ${esc(currentStop.name)}</div>
        <div class="boarding-label" style="margin-top:8px">על איזה קו עלית?</div>
        ${btns}
    `);
}

// Step 2: Pick direction for the selected line
async function boardingPickLine(lineNum) {
    showBoardingOverlay('🚌 קו ' + lineNum, `
        <div class="boarding-spinner"></div>
        <div class="boarding-label" style="text-align:center">מחפש כיוונים...</div>
    `);

    // Find all MOT entries for this line
    const motEntries = lastMotLines.filter(ln => String(ln.Shilut) === lineNum);

    // Use MotLineId (=route_mkt) for precise GTFS matching
    const motLineId = motEntries[0]?.MotLineId;
    const today = new Date().toISOString().slice(0,10);
    let routes = [];
    if (motLineId) {
        try {
            const resp = await fetch(`${GTFS_API}/gtfs_routes/list?route_mkt=${motLineId}&date_from=${today}&date_to=${today}&limit=30`);
            routes = await resp.json();
        } catch(e) { routes = []; }
    }
    // Fallback: search by name if route_mkt returned nothing
    if (routes.length === 0) {
        try {
            const resp = await fetch(`${GTFS_API}/gtfs_routes/list?route_short_name=${encodeURIComponent(lineNum)}&date_from=${today}&date_to=${today}&limit=30`);
            routes = await resp.json();
        } catch(e) { routes = []; }
    }

    // Build direction buttons from MOT data (each MotDirection is a direction)
    const dirMap = {};
    for (const ln of motEntries) {
        const dirKey = ln.MotDirection || 1;
        if (!dirMap[dirKey]) dirMap[dirKey] = ln;
    }

    // Match GTFS routes to get long names
    const dirEntries = Object.values(dirMap);
    let btns = '';
    for (const ln of dirEntries) {
        const dest = ln.DestinationQuarterName || ln.Description || '';
        const company = ln.CompanyHebrewName || '';
        const min = ln.MinutesToArrival;
        const minTxt = min <= 0 ? 'בתחנה' : min + " דק'";
        const motDir = ln.MotDirection || 1;

        // Match by route_direction (same numbering as MOT MotDirection)
        const gtfsRoute = routes.find(r => r.route_direction == motDir);
        const routeId = gtfsRoute ? gtfsRoute.id : null;
        const routeDesc = gtfsRoute?.route_long_name || '';
        const parts = routeDesc.split('<->');
        const dirLabel = parts.length >= 2
            ? parts[0].trim().split('-')[0] + ' → ' + parts[1].trim().split('-')[0]
            : '';

        btns += `<button class="boarding-btn-dir" onclick="boardingConfirm('${esc(lineNum)}',${motDir},${routeId || 'null'})">
            🚌 לכיוון: ${esc(dest)}<br>
            <small style="color:#555">${esc(company)} · ${minTxt}</small>
            ${dirLabel ? `<br><small style="color:#7b1fa2">${esc(dirLabel)}</small>` : ''}
        </button>`;
    }

    showBoardingOverlay('🚌 קו ' + lineNum + ' — כיוון', `
        <div class="boarding-label">לאיזה כיוון אתה נוסע?</div>
        ${btns}
    `);

    window._boardingRoutes = routes;
}

// Step 4: Load stops and show destination picker
async function boardingLoadStops(lineNum, motDir, routeId) {
    showBoardingOverlay('🚌 קו ' + lineNum, `
        <div class="boarding-spinner"></div>
        <div class="boarding-label" style="text-align:center">טוען תחנות...</div>
    `);

    // If no routeId from step 2, find it using MotLineId (route_mkt)
    if (!routeId) {
        const motEntry = window._boardingMotEntry;
        const motLineId = motEntry?.MotLineId;
        try {
            const today = new Date().toISOString().slice(0,10);
            let url = motLineId
                ? `${GTFS_API}/gtfs_routes/list?route_mkt=${motLineId}&date_from=${today}&date_to=${today}&limit=30`
                : `${GTFS_API}/gtfs_routes/list?route_short_name=${encodeURIComponent(lineNum)}&date_from=${today}&date_to=${today}&limit=30`;
            const resp = await fetch(url);
            const routes = await resp.json();
            const match = routes.find(r => r.route_direction == motDir);
            if (match) routeId = match.id;
        } catch(e) {}
    }

    if (!routeId) {
        showBoardingOverlay('🚌 קו ' + lineNum, `
            <div class="boarding-info" style="color:red">⚠️ לא נמצא מסלול לקו זה</div>
        `);
        return;
    }

    try {
        const todayRides = new Date().toISOString().slice(0,10);
        const ridesResp = await fetch(`${GTFS_API}/gtfs_rides/list?gtfs_route_id=${routeId}&start_date_from=${todayRides}&start_date_to=${todayRides}&limit=1&order_by=start_time%20desc`);
        const rides = await ridesResp.json();
        if (!rides || rides.length === 0) throw new Error('לא נמצאו נסיעות');

        const stopsResp = await fetch(`${GTFS_API}/gtfs_ride_stops/list?gtfs_ride_ids=${rides[0].id}&limit=100&order_by=stop_sequence`);
        const stops = await stopsResp.json();
        if (!stops || stops.length === 0) throw new Error('לא נמצאו תחנות');

        // Find the boarding stop (nearest to currentStop)
        let nearestIdx = 0, nearestDist = Infinity;
        if (currentStop.lat && currentStop.lon) {
            for (let i = 0; i < stops.length; i++) {
                const d = haversine(currentStop.lat, currentStop.lon, stops[i].gtfs_stop__lat, stops[i].gtfs_stop__lon);
                if (d < nearestDist) { nearestDist = d; nearestIdx = i; }
            }
        } else {
            // Match by stop code
            for (let i = 0; i < stops.length; i++) {
                if (String(stops[i].gtfs_stop__code) === String(currentStop.code)) { nearestIdx = i; break; }
            }
        }

        const remaining = stops.slice(nearestIdx + 1);
        if (remaining.length === 0) {
            showBoardingOverlay('🚌 קו ' + lineNum, `
                <div class="boarding-info" style="color:red">⚠️ אתה בתחנה האחרונה של הקו</div>
            `);
            return;
        }

        const boardingStop = stops[nearestIdx];
        let stopsHTML = '';
        for (let i = 0; i < remaining.length; i++) {
            const s = remaining[i];
            const stopsLeft = i + 1;
            // Estimate time to this stop from boarding
            let estMin = '';
            if (boardingStop.arrival_time && s.arrival_time) {
                const t1 = new Date(boardingStop.arrival_time).getTime();
                const t2 = new Date(s.arrival_time).getTime();
                if (t2 > t1) estMin = Math.round((t2 - t1) / 60000) + " דק'";
            }
            stopsHTML += `<div class="boarding-stop-item" onclick="boardingSelectDest(${i},'${esc(lineNum)}')">
                <span>${esc(s.gtfs_stop__name)}</span>
                <span class="boarding-stop-city">${esc(s.gtfs_stop__city || '')} · ${stopsLeft} תחנות${estMin ? ' · ' + estMin : ''}</span>
            </div>`;
        }

        showBoardingOverlay('🚌 קו ' + lineNum + ' — איפה יורדים?', `
            <div class="boarding-label">📍 עלית ב: ${esc(boardingStop.gtfs_stop__name)}</div>
            <div class="boarding-label" style="margin-top:8px">בחר תחנת ירידה:</div>
            <div class="boarding-stops">${stopsHTML}</div>
        `);

        window._boardingAllStops = stops;
        window._boardingRemaining = remaining;
        window._boardingLineNum = lineNum;
        window._boardingStartStop = boardingStop;
        window._boardingStartIdx = nearestIdx;

    } catch(e) {
        showBoardingOverlay('🚌 קו ' + lineNum, `
            <div class="boarding-info" style="color:red">⚠️ ${e.message || e}</div>
        `);
    }
}

// Step 5: Destination selected — start monitoring
function boardingSelectDest(idx, lineNum) {
    const dest = window._boardingRemaining[idx];
    const start = window._boardingStartStop;
    const stopsCount = idx + 1;
    const distKm = (haversine(start.gtfs_stop__lat, start.gtfs_stop__lon, dest.gtfs_stop__lat, dest.gtfs_stop__lon) / 1000).toFixed(1);

    let estMin = '';
    if (start.arrival_time && dest.arrival_time) {
        const t1 = new Date(start.arrival_time).getTime();
        const t2 = new Date(dest.arrival_time).getTime();
        if (t2 > t1) estMin = Math.round((t2 - t1) / 60000);
    }

    showBoardingOverlay('🚌 קו ' + lineNum + ' — יעד', `
        <div style="text-align:center">
            <div class="boarding-label">📍 מ: ${esc(start.gtfs_stop__name)}</div>
            <div class="alert-dest-name">🏁 אל: ${esc(dest.gtfs_stop__name)}</div>
            <div style="font-size:14px;color:#555;margin:8px 0">
                📏 ${distKm} ק"מ · 🚏 ${stopsCount} תחנות
                ${estMin ? ' · ⏱️ ~' + estMin + ' דקות' : ''}
            </div>
        </div>
        <button class="boarding-btn boarding-btn-primary" style="margin-top:14px;font-size:16px" onclick="boardingStartMonitor()">
            🔔 התחל מעקב — תתריע תחנה לפני
        </button>
        <button class="boarding-btn" style="background:#eee;color:#555;margin-top:6px" onclick="closeBoarding()">
            לא תודה
        </button>
    `);

    window._boardingDest = dest;
    window._boardingDestIdx = idx;
}

// Step 6: Active monitoring — API-based, NO GPS
async function boardingStartMonitor() {
    const dest = window._boardingDest;
    const destIdx = window._boardingDestIdx;
    const lineNum = window._boardingLineNum;
    const remaining = window._boardingRemaining;
    const startStop = window._boardingStartStop;
    if (!dest || !remaining) return;

    // Request notification permission
    if ('Notification' in window && Notification.permission === 'default') {
        await Notification.requestPermission();
    }

    // Keep screen on
    try {
        if ('wakeLock' in navigator) {
            boardingWakeLock = await navigator.wakeLock.request('screen');
        }
    } catch(e) {}

    // Build stops list: boarding stop (index 0) + remaining up to dest
    const trackStops = [];
    // First entry = boarding stop (already passed — we're ON the bus)
    trackStops.push({
        name: startStop.gtfs_stop__name,
        city: startStop.gtfs_stop__city || '',
        code: String(startStop.gtfs_stop__code || ''),
        isDest: false, isAlert: false
    });
    for (let i = 0; i <= destIdx; i++) {
        trackStops.push({
            name: remaining[i].gtfs_stop__name,
            city: remaining[i].gtfs_stop__city || '',
            code: String(remaining[i].gtfs_stop__code || ''),
            isDest: (i === destIdx),
            isAlert: (i === destIdx - 1)
        });
    }

    // State: bus is at stop 0 (boarding stop), next to check is stop 1
    window._boardingTrackStops = trackStops;
    window._boardingCurrentIdx = 0;       // bus is HERE
    window._boardingLineNum = lineNum;
    window._boardingDest = dest;
    window._boardingAlerted = false;
    window._boardingLastEta = null;        // last ETA minutes seen at next stop
    window._boardingPollBusy = false;

    // Close wizard overlay
    closeBoarding();

    // Build UI
    boardingCreateMonitorUI(lineNum, dest, trackStops);
    boardingRefreshUI();

    // Start API polling every 15 seconds
    boardingTimer = setInterval(() => boardingPollNextStop(), 15000);
    // First poll immediately
    boardingPollNextStop();
}

// Poll MOT API at the NEXT stop to detect when our bus arrives there
async function boardingPollNextStop() {
    if (window._boardingPollBusy) return;
    window._boardingPollBusy = true;

    try {
        const trackStops = window._boardingTrackStops;
        const curIdx = window._boardingCurrentIdx;
        const nextIdx = curIdx + 1;
        const lineNum = window._boardingLineNum;
        const dest = window._boardingDest;

        if (nextIdx >= trackStops.length) {
            // Already at destination — should not happen, but handle
            window._boardingPollBusy = false;
            return;
        }

        const nextStop = trackStops[nextIdx];
        const stopCode = nextStop.code;
        if (!stopCode) { window._boardingPollBusy = false; return; }

        // Fetch MOT real-time data for the next stop
        const ts = Date.now();
        const url = `${PROXY}${encodeURIComponent(MOT_API + '/GetRealtimeBusLineListByBustop/' + stopCode + '/he/false')}&_t=${ts}`;
        const resp = await fetch(url, { cache: 'no-store' });
        const data = await resp.json();
        const lines = data?.value || data || [];

        // Find our line at this stop
        const match = lines.find(ln => String(ln.Shilut) === lineNum);

        // Update status display
        const statusEl = document.getElementById('monPollStatus');

        if (match) {
            // Get the soonest arrival for this line
            const arrivals = match.MinutesToArrivalList || (match.MinutesToArrival != null ? [match.MinutesToArrival] : []);
            const minEta = arrivals.length > 0 ? Math.min(...arrivals) : null;
            window._boardingLastEta = minEta;

            if (statusEl) statusEl.textContent = `🔍 קו ${lineNum} → ${esc(nextStop.name)}: ${minEta != null ? minEta + " דק'" : 'ממתין...'}`;

            // Is this the DESTINATION stop?
            if (nextStop.isDest) {
                // At destination: alert when ≤ 2 minutes
                if (minEta != null && minEta <= 2 && !window._boardingAlerted) {
                    boardingTriggerAlert(dest);
                }
                // When bus arrives (0 or negative) — advance and stop polling
                if (minEta != null && minEta <= 0) {
                    window._boardingCurrentIdx = nextIdx;
                    boardingRefreshUI();
                    clearInterval(boardingTimer);
                    boardingTimer = null;
                }
            } else {
                // Normal stop: advance when bus arrives (MinutesToArrival ≤ 0)
                if (minEta != null && minEta <= 0) {
                    window._boardingCurrentIdx = nextIdx;
                    boardingRefreshUI();
                    if (statusEl) statusEl.textContent = `✅ הגענו ל${nextStop.name}!`;
                    // Check: is the NEXT stop the destination?
                    // If so and alert stop: notify
                    if (nextStop.isAlert && !window._boardingAlerted) {
                        // One stop before destination — start alerting
                    }
                }
            }
        } else {
            // Line not found at next stop — could mean:
            // a) Bus already passed (advance!)  b) API didn't return it yet
            // Be conservative: show "searching" status
            if (statusEl) statusEl.textContent = `🔍 מחפש קו ${lineNum} בתחנת ${nextStop.name}...`;
            window._boardingLastEta = null;
        }

        boardingRefreshUI();

    } catch(e) {
        const statusEl = document.getElementById('monPollStatus');
        if (statusEl) statusEl.textContent = '⚠️ שגיאת תקשורת, ממשיך לנסות...';
    }

    window._boardingPollBusy = false;
}

// Create the monitor DOM elements once (bar + panel)
function boardingCreateMonitorUI(lineNum, dest, trackStops) {
    document.querySelectorAll('.monitor-bar, .monitor-panel, .monitor-backdrop').forEach(el => el.remove());

    // === Floating bottom bar ===
    const bar = document.createElement('div');
    bar.className = 'monitor-bar';
    bar.id = 'monitorBar';
    bar.innerHTML = `
        <span class="close-x" onclick="event.stopPropagation();closeBoarding()">✕</span>
        <div class="monitor-bar-top">
            <div>
                <div class="monitor-bar-line">🚌 קו ${esc(lineNum)}</div>
                <div class="monitor-bar-dest">🏁 ${esc(dest.gtfs_stop__name)}</div>
                <div id="barCurrentStop" style="font-size:11px;opacity:0.8;margin-top:2px"></div>
            </div>
            <div class="monitor-bar-stats">
                <div class="monitor-bar-stat">
                    <div class="monitor-bar-num" id="barStops">-</div>
                    <div class="monitor-bar-lbl">תחנות</div>
                </div>
                <div class="monitor-bar-stat">
                    <div class="monitor-bar-num" id="barMins">-</div>
                    <div class="monitor-bar-lbl">דקות</div>
                </div>
            </div>
        </div>
        <div class="monitor-bar-progress"><div class="monitor-bar-fill" id="barFill" style="width:0%"></div></div>
        <div class="monitor-bar-expand">▲ הקש לפרטים</div>
    `;
    bar.onclick = () => toggleMonitorPanel(true);
    document.body.appendChild(bar);

    // === Expandable panel ===
    const panel = document.createElement('div');
    panel.className = 'monitor-panel';
    panel.id = 'monitorPanel';

    let trackHTML = '';
    for (let i = 0; i < trackStops.length; i++) {
        const s = trackStops[i];
        const cityTag = s.city ? ` <span class="track-city">${esc(s.city)}</span>` : '';
        trackHTML += `<div class="track-stop" id="trackStop${i}" data-idx="${i}">
            <div class="track-dot" id="trackDot${i}">${i + 1}</div>
            <span class="track-name" id="trackName${i}">${esc(s.name)}${cityTag}</span>
            <span class="track-time" id="trackTime${i}"></span>
        </div>`;
    }

    panel.innerHTML = `
        <div class="monitor-panel-handle"></div>
        <div class="monitor-panel-header">
            <div style="font-weight:800;font-size:16px">🚌 קו ${esc(lineNum)} → ${esc(dest.gtfs_stop__name)}</div>
            <div class="monitor-panel-close" onclick="toggleMonitorPanel(false)">▼ סגור</div>
        </div>
        <div class="monitor-panel-stats">
            <div class="monitor-stat">
                <div class="monitor-stat-val" id="panelStops">-</div>
                <div class="monitor-stat-label">תחנות נותרו</div>
            </div>
            <div class="monitor-stat">
                <div class="monitor-stat-val" id="panelMins">-</div>
                <div class="monitor-stat-label">דקות לתחנה הבאה</div>
            </div>
        </div>
        <div id="monPollStatus" style="font-size:12px;color:#888;text-align:center;margin:4px 0;direction:rtl"></div>
        <div id="monAlertBanner"></div>
        <div class="track-container" id="trackContainer">
            <div class="track-rail"></div>
            <div class="track-rail-fill" id="trackFill" style="height:0%"></div>
            ${trackHTML}
        </div>
        <div style="padding:10px 16px;text-align:center">
            <button onclick="closeBoarding()" style="background:#eee;border:none;padding:10px 24px;border-radius:10px;font-size:14px;color:#555;font-weight:700;cursor:pointer">
                ✕ סיים מעקב
            </button>
        </div>
    `;
    document.body.appendChild(panel);

    const bd = document.createElement('div');
    bd.className = 'monitor-backdrop';
    bd.id = 'monitorBackdrop';
    bd.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);z-index:1550;display:none';
    bd.onclick = () => toggleMonitorPanel(false);
    document.body.appendChild(bd);
}

function toggleMonitorPanel(open) {
    const panel = document.getElementById('monitorPanel');
    const bd = document.getElementById('monitorBackdrop');
    if (!panel) return;
    if (open) {
        panel.classList.add('open');
        if (bd) bd.style.display = 'block';
        setTimeout(() => {
            const cur = panel.querySelector('.track-stop.current');
            if (cur) cur.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 400);
    } else {
        panel.classList.remove('open');
        if (bd) bd.style.display = 'none';
    }
}

// Refresh UI based on _boardingCurrentIdx — no full rebuild, just class/text changes
function boardingRefreshUI() {
    const trackStops = window._boardingTrackStops;
    const curIdx = window._boardingCurrentIdx;
    const dest = window._boardingDest;
    const lineNum = window._boardingLineNum;
    if (!trackStops) return;

    const stopsLeft = trackStops.length - 1 - curIdx;
    const progressPct = Math.min(100, Math.round((curIdx / (trackStops.length - 1)) * 100));
    const isUrgent = stopsLeft <= 2;
    const eta = window._boardingLastEta;
    const currentStopName = trackStops[curIdx]?.name || '';

    // Bar
    const barStops = document.getElementById('barStops');
    const barMins = document.getElementById('barMins');
    const barFill = document.getElementById('barFill');
    const barCurrent = document.getElementById('barCurrentStop');
    if (barStops) { barStops.textContent = stopsLeft > 0 ? stopsLeft : '✓'; barStops.className = 'monitor-bar-num' + (isUrgent ? ' urgent' : ''); }
    if (barMins) { barMins.textContent = eta != null ? '~' + eta : '?'; barMins.className = 'monitor-bar-num' + (isUrgent ? ' urgent' : ''); }
    if (barFill) barFill.style.width = progressPct + '%';
    if (barCurrent) barCurrent.textContent = '📍 ' + currentStopName;

    // Panel stats
    const panelStops = document.getElementById('panelStops');
    const panelMins = document.getElementById('panelMins');
    const trackFill = document.getElementById('trackFill');
    if (panelStops) { panelStops.textContent = stopsLeft > 0 ? stopsLeft : '✓'; panelStops.className = 'monitor-stat-val' + (isUrgent ? ' urgent' : ''); }
    if (panelMins) { panelMins.textContent = eta != null ? '~' + eta : '?'; panelMins.className = 'monitor-stat-val' + (isUrgent ? ' urgent' : ''); }
    if (trackFill) trackFill.style.height = progressPct + '%';

    // Track dots and names
    for (let i = 0; i < trackStops.length; i++) {
        const el = document.getElementById('trackStop' + i);
        const dot = document.getElementById('trackDot' + i);
        const timeEl = document.getElementById('trackTime' + i);
        if (!el) continue;
        const s = trackStops[i];
        const passed = i < curIdx;
        const isCurrent = i === curIdx;
        const isNext = i === curIdx + 1;
        let cls = 'track-stop';
        if (passed) cls += ' passed';
        if (isCurrent) cls += ' current';
        if (s.isDest) cls += ' dest';
        if (s.isAlert && !passed && !isCurrent) cls += ' alert-stop';
        el.className = cls;
        if (dot) dot.textContent = s.isDest ? '🏁' : (passed ? '✓' : (isCurrent ? '🚌' : (i + 1)));
        // Show ETA only on the next stop
        if (timeEl) {
            if (isNext && eta != null) {
                timeEl.textContent = eta + " דק'";
                timeEl.style.fontWeight = '700';
                timeEl.style.color = eta <= 2 ? '#d32f2f' : '#1565c0';
            } else {
                timeEl.textContent = '';
            }
        }
    }

    // Alert banner
    const alertEl = document.getElementById('monAlertBanner');
    if (alertEl && window._boardingAlerted) {
        alertEl.innerHTML = `<div class="monitor-alert-banner">🔔 תתכונן לרדת! ${esc(dest.gtfs_stop__name)}</div>`;
    }

    // Bar color
    const bar = document.getElementById('monitorBar');
    if (bar) {
        bar.style.background = isUrgent
            ? 'linear-gradient(135deg, #b71c1c, #d32f2f)'
            : 'linear-gradient(135deg, #1a237e, #283593)';
    }

    // Scroll to current
    setTimeout(() => {
        const cur = document.getElementById('trackStop' + curIdx);
        if (cur && document.getElementById('monitorPanel')?.classList.contains('open')) {
            cur.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    }, 200);
}

function boardingTriggerAlert(dest) {
    if (window._boardingAlerted) return;
    window._boardingAlerted = true;

    // Double vibration series (user requested two series, one is not enough)
    if (navigator.vibrate) {
        navigator.vibrate([500, 200, 500, 200, 500, 200, 500]);
        setTimeout(() => {
            navigator.vibrate([500, 200, 500, 200, 500, 200, 500]);
        }, 3000);
    }

    // Notification
    if ('Notification' in window && Notification.permission === 'granted') {
        new Notification('🚌 תתכונן לרדת!', {
            body: dest.gtfs_stop__name + ' — עוד 2 דקות!',
            requireInteraction: true,
            tag: 'bus-alert'
        });
    }

    // Force panel open
    toggleMonitorPanel(true);
    boardingRefreshUI();
}

buildButtons();
renderFavorites();
document.getElementById('mainContent').innerHTML = '<div style="text-align:center;padding:40px 20px;color:#999;font-size:15px;">👆 בחר תחנה מהכפתורים למעלה</div>';
</script>
