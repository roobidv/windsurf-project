<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>בדיקת מרחק מתחנה</title>
<style>
  body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
  .card { background: white; border-radius: 12px; padding: 20px; max-width: 400px; margin: auto; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  h2 { color: #1565c0; text-align: center; }
  .info { background: #e3f2fd; border-radius: 8px; padding: 12px; margin: 10px 0; font-size: 14px; }
  .dist { font-size: 36px; font-weight: 900; text-align: center; margin: 16px 0; }
  .dist.near { color: #2e7d32; }
  .dist.mid { color: #e65100; }
  .dist.far { color: #c62828; }
  button { width: 100%; padding: 14px; background: #1565c0; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 10px; }
  button:hover { background: #0d47a1; }
  #status { text-align: center; font-size: 13px; color: #666; margin-top: 8px; min-height: 20px; }
  .stop-name { font-weight: 700; font-size: 16px; color: #333; }
  .coords { font-size: 11px; color: #999; direction: ltr; }
</style>
</head>
<body>
<div class="card">
  <h2>📍 בדיקת מרחק מתחנה</h2>

  <div class="info">
    <div class="stop-name">🚏 ויצמן/ירושלים — כפר סבא</div>
    <div class="coords">37032 | 32.175585, 34.906570</div>
  </div>

  <div id="distDisplay" class="dist" style="color:#999">— מ'</div>
  <div id="status">לחץ כדי לאתר מיקום</div>

  <button onclick="getLocation()">📡 מדוד מרחק עכשיו</button>
  <button onclick="startWatch()" style="background:#2e7d32;margin-top:6px">🔄 מעקב רציף</button>
  <button onclick="stopWatch()" style="background:#888;margin-top:6px">⏹ עצור מעקב</button>
  <hr style="margin:14px 0;border-color:#eee">
  <div style="font-size:12px;color:#888;text-align:center;margin-bottom:6px">🧪 סימולציה — בדיקה ללא GPS</div>
  <button onclick="simulate()" style="background:#7b1fa2;margin-top:0">🧪 סמלץ: אני בתחנה 37018</button>
</div>

<script>
const STOP_LAT = 32.175585;
const STOP_LON = 34.906570;
const ALERT_METERS = 150;
let watchId = null;
let alerted = false;

function haversine(lat1, lon1, lat2, lon2) {
    const R = 6371000;
    const toRad = x => x * Math.PI / 180;
    const dLat = toRad(lat2 - lat1), dLon = toRad(lon2 - lon1);
    const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2)**2;
    return Math.round(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
}

function showDistance(dist) {
    const el = document.getElementById('distDisplay');
    el.textContent = dist + " מ'";
    el.className = 'dist ' + (dist < 150 ? 'near' : dist < 500 ? 'mid' : 'far');

    if (dist < ALERT_METERS && !alerted) {
        alerted = true;
        if (navigator.vibrate) navigator.vibrate([500, 200, 500]);
        document.getElementById('status').textContent = '🔔 הגעת לטווח ' + ALERT_METERS + ' מטר!';
        alert('🔔 הגעת לטווח ' + ALERT_METERS + ' מטר מהתחנה!');
    } else {
        document.getElementById('status').textContent = 'עודכן: ' + new Date().toLocaleTimeString('he-IL');
    }
}

function getLocation() {
    document.getElementById('status').textContent = '📡 מאתר מיקום...';
    navigator.geolocation.getCurrentPosition(
        pos => {
            const dist = haversine(pos.coords.latitude, pos.coords.longitude, STOP_LAT, STOP_LON);
            showDistance(dist);
        },
        err => { document.getElementById('status').textContent = 'שגיאה: ' + err.message; },
        { enableHighAccuracy: true, timeout: 10000 }
    );
}

function startWatch() {
    alerted = false;
    document.getElementById('status').textContent = '🔄 מעקב פעיל...';
    watchId = navigator.geolocation.watchPosition(
        pos => {
            const dist = haversine(pos.coords.latitude, pos.coords.longitude, STOP_LAT, STOP_LON);
            showDistance(dist);
        },
        err => { document.getElementById('status').textContent = 'שגיאה: ' + err.message; },
        { enableHighAccuracy: true, timeout: 15000, maximumAge: 5000 }
    );
}

function stopWatch() {
    if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
    document.getElementById('status').textContent = 'מעקב הופסק';
}

function simulate() {
    // תחנה 37018: טשרניחובסקי/ויצמן, כפר סבא
    const simLat = 32.177906;
    const simLon = 34.894049;
    const dist = haversine(simLat, simLon, STOP_LAT, STOP_LON);
    document.getElementById('status').textContent = '🧪 סימולציה: תחנה 37018 (טשרניחובסקי/ויצמן)';
    showDistance(dist);
}
</script>
</body>
</html>
